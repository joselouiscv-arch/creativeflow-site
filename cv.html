        .repeatable-block,
        body.theme-dark .repeatable-block {
            border: 1px solid var(--cf-line);
            border-radius: 20px;
            background: var(--cf-card);
            box-shadow: none;
        }

        .btn-add,
        .btn-outline,
        .btn-submit,
        .cv-action-submit,
        .photo-editor-action.primary {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease !important;
        }

        .btn-add,
        .btn-outline {
            color: var(--cf-persian) !important;
            background: #fff !important;
        }

        .btn-submit,
        .cv-action-submit,
        .photo-editor-action.primary {
            border: 0 !important;
            border-radius: 999px;
            background: linear-gradient(135deg, #3569c8, var(--cf-persian)) !important;
            color: #fff !important;
            box-shadow: 0 14px 26px rgba(27,44,193,0.2) !important;
        }

        .btn-add:hover,
        .btn-outline:hover,
        .btn-submit:hover,
        .cv-action-submit:hover,
        .photo-editor-action.primary:hover {
            transform: translateY(-1px) scale(1.02);
        }

        .footer-divider { border-color: var(--cf-line); }
        .footer-text { color: var(--cf-muted); }

        .custom-calendar,
        body.theme-dark .custom-calendar {
            border: 1px solid var(--cf-line);
            border-radius: 18px;
            background: #fff;
            box-shadow: var(--cf-shadow);
        }

        @media (max-width: 1100px) {
            .tabs-container { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .form-workspace { grid-template-columns: 1fr; }
            .cv-action-panel {
                display: block !important;
                order: 2;
                position: static !important;
                margin-top: 18px;
                margin-bottom: 0;
            }
            #cvForm { order: 1; }
            .cv-action-submit {
                width: 100%;
                min-height: 58px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                padding: 0 22px;
                font-size: 14px;
                font-weight: 800;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                line-height: 1;
            }
        }

        @media (max-width: 640px) {
            .container { width: min(100% - 20px, 1180px); padding: 18px 0 36px; }
            .form-topbar { display: block; padding: 20px; border-radius: 22px; }
            .form-topbar::after { display: block; margin: 8px 0 0; text-align: left; }
            .tabs-container { grid-template-columns: repeat(2, minmax(0, 1fr)); border-radius: 20px; }
            .tab-btn { padding: 11px 8px; font-size: 11px; }
            #cvForm { padding: 14px; border-radius: 22px; }
            .section-content { padding: 16px; }
            .cv-action-panel {
                padding: 28px 22px;
                border-radius: 28px;
            }
            .cv-action-title {
                font-size: 26px;
                line-height: 1.18;
                margin-bottom: 10px;
            }
            .cv-action-copy {
                font-size: 16px;
                line-height: 1.65;
                margin-bottom: 18px;
            }
        }

        body.theme-dark .tabs-container,
        body.theme-dark .top-buttons,
        body.theme-dark .cv-action-panel {
            background: rgba(255,255,255,0.96) !important;
            border-color: var(--cf-line) !important;
            box-shadow: var(--cf-soft-shadow) !important;
        }

        body.theme-dark .tab-btn,
        body.theme-dark .btn-outline {
            background: #fbfcff !important;
            border-color: var(--cf-line) !important;
            color: var(--cf-dusk) !important;
            box-shadow: none !important;
        }

        body.theme-dark .tab-btn:hover,
        body.theme-dark .btn-outline:hover {
            background: var(--cf-soft) !important;
            color: var(--cf-persian) !important;
        }

        body.theme-dark .tab-btn.active {
            background: var(--cf-navy) !important;
            border-color: var(--cf-navy) !important;
            color: #fff !important;
            box-shadow: 0 10px 20px rgba(9,21,64,0.16) !important;
        }

        body.theme-dark .cv-action-title { color: var(--cf-navy) !important; }
        body.theme-dark .cv-action-copy { color: var(--cf-muted) !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-topbar">
            <h1 class="form-title">FORMULÁRIO CV</h1>
            <button type="button" class="theme-toggle" id="themeToggle" aria-label="Alternar tema" title="Alternar tema claro/escuro">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="form-shell">
        <div class="tabs-container" role="tablist">
            <button type="button" class="tab-btn active" data-tab="info" role="tab" aria-selected="true" tabindex="0">
                <i class="fas fa-user"></i> 1 Info
            </button>
            <button type="button" class="tab-btn" data-tab="perfil" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-briefcase"></i> 2 Perfil
            </button>
            <button type="button" class="tab-btn" data-tab="cargo" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-bullseye"></i> 3 Cargo
            </button>
            <button type="button" class="tab-btn" data-tab="idiomas" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-globe"></i> 4 Idiomas
            </button>
            <button type="button" class="tab-btn" data-tab="experiencia" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-history"></i> 5 Experiência
            </button>
            <button type="button" class="tab-btn" data-tab="educacao" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-graduation-cap"></i> 6 Educação
            </button>
            <button type="button" class="tab-btn" data-tab="competencias" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-star"></i> 7 Skills
            </button>
            <button type="button" class="tab-btn" data-tab="interesses" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-heart"></i> 8 Interesses
            </button>
            <button type="button" class="tab-btn" data-tab="adicionais" role="tab" aria-selected="false" tabindex="-1">
                <i class="fas fa-info-circle"></i> 9 Adicionais
            </button>
        </div>

        <div class="form-workspace">
        <form id="cvForm">
            <div id="panel-root"></div>

            <div class="footer-divider"></div>
            <p class="footer-text">Os teus dados são usados apenas para gerar o teu CV em PDF e não são armazenados.</p>

            <div class="form-footer">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-file-export"></i> Emitir CV
                </button>
            </div>
        </form>
        <aside class="cv-action-panel" aria-label="Emitir CV">
            <div class="cv-action-title">Pronto para gerar?</div>
            <p class="cv-action-copy">Os teus dados são usados apenas para gerar o teu CV em PDF.</p>
            <button type="submit" form="cvForm" class="cv-action-submit">
                <i class="fas fa-file-export"></i> Emitir CV
            </button>
        </aside>
        </div>
        </div>
    </div>

    <script defer>
        // ── MEMÓRIA ENTRE ABAS ───────────────────────────────────────
        const formMemory = {};
        const PHOTO_PROFILE_SIZE = 100;
        const PHOTO_EXPORT_SIZE = 400;
        const PHOTO_EDITOR_SIZE = 320;
        let uploadedPhoto = null;
        let photoEditState = null;

        function setTheme(mode) {
            const isDark = mode === 'dark';
            document.body.classList.toggle('theme-dark', isDark);
            const btn = document.getElementById('themeToggle');
            if (btn) {
                btn.innerHTML = `<i class="fas fa-${isDark ? 'sun' : 'moon'}"></i>`;
                btn.setAttribute('aria-label', isDark ? 'Ativar tema claro' : 'Ativar tema escuro');
                btn.title = isDark ? 'Ativar tema claro' : 'Ativar tema escuro';
            }
            try { localStorage.setItem('cv_form_theme', isDark ? 'dark' : 'light'); } catch(e) {}
        }

        function initThemeToggle() {
            const saved = (() => { try { return localStorage.getItem('cv_form_theme'); } catch(e) { return null; } })();
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            setTheme(saved || (prefersDark ? 'dark' : 'light'));
            const btn = document.getElementById('themeToggle');
            if (btn) {
                btn.addEventListener('click', () => {
                    setTheme(document.body.classList.contains('theme-dark') ? 'light' : 'dark');
                });
            }
        }

        function initIntro() {
            const intro = document.getElementById('introScreen');
            const startBtn = document.getElementById('introStartBtn');
            if (!intro || !startBtn) {
                document.body.classList.remove('intro-active');
                return;
            }

            const enterForm = () => {
                intro.classList.add('leaving');
                document.body.classList.add('form-entered');
                setTimeout(() => {
                    document.body.classList.remove('intro-active');
                    intro.remove();
                    document.querySelectorAll('.tab-btn').forEach((btn, index) => {
                        btn.style.animation = `navItemReveal 0.52s cubic-bezier(0.2,1.25,0.28,1) ${index * 42}ms both`;
                    });
                }, 520);
            };

            startBtn.addEventListener('click', enterForm);
            intro.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') enterForm();
            });
        }

        const repeatableTabs = {
            cargo: { containerId: 'cargoContainer', add: () => addCargo(), names: ['cargo_pretendido[]', 'cargo_area[]'] },
            idiomas: { containerId: 'idiomasContainer', add: () => addIdioma(), names: ['idioma[]', 'idioma_ouvir[]', 'idioma_ler[]', 'idioma_interacao[]', 'idioma_producao[]', 'idioma_escrever[]'] },
            experiencia: { containerId: 'experienciaContainer', add: () => addExperiencia(), names: ['exp_inicio[]', 'exp_fim[]', 'exp_funcao[]', 'exp_empresa[]', 'exp_local[]', 'exp_descricao[]'] },
            educacao: { containerId: 'educacaoContainer', add: () => addEducacao(), names: ['edu_inicio[]', 'edu_fim[]', 'edu_curso[]', 'edu_inst[]', 'edu_local[]'] },
            competencias: { containerId: 'competenciasContainer', add: () => addCompetencia(), names: ['comp_tipo[]', 'comp_nivel[]'] }
        };

        function repeatKey(tabName) {
            return '_repeat_' + tabName;
        }

        function inferRepeatCount(config) {
            let max = 0;
            config.names.forEach(name => {
                Object.keys(formMemory).forEach(key => {
                    const prefix = name + '_';
                    if (key.startsWith(prefix)) {
                        const idx = Number(key.slice(prefix.length));
                        if (!Number.isNaN(idx)) max = Math.max(max, idx + 1);
                    }
                });
            });
            return max;
        }

        function saveRepeatCount() {
            const config = repeatableTabs[currentTab];
            if (!config) return;
            const container = document.getElementById(config.containerId);
            if (!container) return;
            formMemory[repeatKey(currentTab)] = container.querySelectorAll('.repeatable-block').length;
        }

        function clearCurrentRepeatValues() {
            const config = repeatableTabs[currentTab];
            if (!config) return;
            Object.keys(formMemory).forEach(key => {
                const belongsToTab = config.names.some(name =>
                    key.startsWith(name + '_') ||
                    key.startsWith('hidden_' + name + '_') ||
                    key.startsWith('rich_' + name + '_') ||
                    key.startsWith('date_' + name + '_')
                );
                if (belongsToTab || key.startsWith('dateBtn_')) {
                    delete formMemory[key];
                }
            });
        }

        function ensureRepeatableBlocks() {
            const config = repeatableTabs[currentTab];
            if (!config) return;
            const container = document.getElementById(config.containerId);
            if (!container) return;

            const savedCount = formMemory[repeatKey(currentTab)];
            const desired = savedCount !== undefined ? savedCount : inferRepeatCount(config);
            let current = container.querySelectorAll('.repeatable-block').length;

            while (current < desired) {
                config.add();
                current++;
            }
        }

        function richKey(wrapper) {
            const name = wrapper.dataset.name;
            const siblings = Array.from(document.querySelectorAll('#panel-root .rich-editor-wrapper'))
                .filter(item => item.dataset.name === name);
            return 'rich_' + name + '_' + siblings.indexOf(wrapper);
        }

        function fieldIndex(el) {
            if (!el || !el.name) return 0;
            return Array.from(document.querySelectorAll(`#panel-root [name="${el.name}"]`)).indexOf(el);
        }

        function dateMemoryKey(hidden) {
            return 'date_' + hidden.name + '_' + fieldIndex(hidden);
        }

        function formatIsoDateForButton(value) {
            const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (!match) return '';
            return `${match[3]}/${match[2]}/${match[1]}`;
        }

        function updateDateButtonFromHidden(hidden) {
            const wrapper = hidden.closest('.date-wrapper');
            const btn = wrapper ? wrapper.querySelector('.date-display-btn') : null;
            if (!btn) return;
            const span = btn.querySelector('.date-text');
            const formatted = formatIsoDateForButton(hidden.value);
            if (span) span.textContent = formatted || 'Selecionar data';
            btn.classList.toggle('has-value', Boolean(formatted));
            btn.classList.toggle('placeholder-text', !formatted);
        }

        function saveTabData() {
            saveRepeatCount();
            clearCurrentRepeatValues();
            // Inputs e selects normais
            document.querySelectorAll('#panel-root input, #panel-root select, #panel-root textarea').forEach(el => {
                if (!el.name) return;
                if (el.type === 'checkbox') {
                    formMemory[el.name] = el.checked;
                } else {
                    const key = el.name + '_' + (Array.from(document.querySelectorAll(`[name="${el.name}"]`)).indexOf(el));
                    formMemory[key] = el.value;
                }
            });
            // Rich editors
            document.querySelectorAll('#panel-root .rich-editor').forEach(editor => {
                const wrapper = editor.closest('.rich-editor-wrapper');
                if (!wrapper) return;
                if (wrapper.dataset.name) formMemory[richKey(wrapper)] = editor.innerHTML;
            });
            // Datas (hidden inputs dos calendários)
            document.querySelectorAll('#panel-root input[type="hidden"]').forEach((el, i) => {
                if (el.name) formMemory['hidden_' + el.name + '_' + i] = el.value;
            });
            document.querySelectorAll('#panel-root .date-wrapper input[type="hidden"]').forEach(el => {
                if (el.name) formMemory[dateMemoryKey(el)] = el.value;
            });
            // Botões de data (texto visível)
            document.querySelectorAll('#panel-root .date-display-btn').forEach((btn, i) => {
                const span = btn.querySelector('.date-text');
                if (span) formMemory['dateBtn_' + i] = { text: span.textContent, hasValue: btn.classList.contains('has-value') };
            });
            // Interesses
            const interestsContainer = document.getElementById('interestsContainer');
            if (interestsContainer) {
                formMemory['interests'] = Array.from(interestsContainer.querySelectorAll('.interest-badge')).map(b => b.childNodes[0].textContent.trim());
            }
        }

        function restoreTabData() {
            ensureRepeatableBlocks();
            // Inputs e selects normais
            document.querySelectorAll('#panel-root input, #panel-root select, #panel-root textarea').forEach(el => {
                if (!el.name) return;
                if (el.type === 'checkbox') {
                    if (formMemory[el.name] !== undefined) {
                        el.checked = formMemory[el.name];
                        if (el.checked) toggleDataFim && toggleDataFim(el);
                    }
                } else {
                    const key = el.name + '_' + (Array.from(document.querySelectorAll(`[name="${el.name}"]`)).indexOf(el));
                    if (formMemory[key] !== undefined) el.value = formMemory[key];
                }
            });
            // Rich editors
            document.querySelectorAll('#panel-root .rich-editor').forEach(editor => {
                const wrapper = editor.closest('.rich-editor-wrapper');
                if (!wrapper) return;
                const saved = formMemory[richKey(wrapper)];
                if (saved !== undefined) {
                    editor.innerHTML = saved;
                    syncRichEditor(editor);
                }
            });
            // Datas (hidden inputs)
            document.querySelectorAll('#panel-root input[type="hidden"]').forEach((el, i) => {
                const key = 'hidden_' + el.name + '_' + i;
                if (formMemory[key] !== undefined) el.value = formMemory[key];
            });
            document.querySelectorAll('#panel-root .date-wrapper input[type="hidden"]').forEach(el => {
                const exactKey = dateMemoryKey(el);
                const fallbackKey = el.name + '_' + fieldIndex(el);
                if (formMemory[exactKey] !== undefined) {
                    el.value = formMemory[exactKey];
                } else if (formMemory[fallbackKey] !== undefined) {
                    el.value = formMemory[fallbackKey];
                }
                updateDateButtonFromHidden(el);
            });
            // Botões de data
            document.querySelectorAll('#panel-root .date-display-btn').forEach((btn, i) => {
                const saved = formMemory['dateBtn_' + i];
                if (saved) {
                    const span = btn.querySelector('.date-text');
                    if (span) span.textContent = saved.text;
                    if (saved.hasValue) { btn.classList.add('has-value'); btn.classList.remove('placeholder-text'); }
                }
            });
            document.querySelectorAll('#panel-root .date-wrapper input[type="hidden"]').forEach(updateDateButtonFromHidden);
            // Interesses
            const interestsContainer = document.getElementById('interestsContainer');
            if (interestsContainer && formMemory['interests']) {
                formMemory['interests'].forEach(val => {
                    const badge = document.createElement('div');
                    badge.className = 'interest-badge';
                    badge.innerHTML = `${val}<button type="button" onclick="this.closest('.interest-badge').remove()">×</button>`;
                    interestsContainer.appendChild(badge);
                });
            }
        }
        // ── END MEMÓRIA ──────────────────────────────────────────────

        const TAB_CONFIG = {
            info: {
                title: 'Informações Pessoais',
                icon: 'user',
                render: renderInfoTab
            },
            perfil: {
                title: 'Perfil Profissional',
                icon: 'briefcase',
                render: renderPerfilTab
            },
            cargo: {
                title: 'Cargo/Área Pretendida',
                icon: 'bullseye',
                render: renderCargoTab
            },
            idiomas: {
                title: 'Idiomas',
                icon: 'globe',
                render: renderIdiomasTab
            },
            experiencia: {
                title: 'Experiência Profissional',
                icon: 'history',
                render: renderExperienciaTab
            },
            educacao: {
                title: 'Educação e Formação',
                icon: 'graduation-cap',
                render: renderEducacaoTab
            },
            competencias: {
                title: 'Competências Profissionais',
                icon: 'star',
                render: renderCompetenciasTab
            },
            interesses: {
                title: 'Interesses e Hobbies',
                icon: 'heart',
                render: renderInteressesTab
            },
            adicionais: {
                title: 'Informações Adicionais',
                icon: 'info-circle',
                render: renderAdicionaisTab
            }
        };

        const TAB_ORDER = Object.keys(TAB_CONFIG);
        let currentTab = 'info';

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => switchTab(btn.dataset.tab));
            btn.addEventListener('keydown', handleTabKeydown);
        });

        function switchTab(tabName, options = {}) {
            const { skipSave = false, force = false } = options;
            if (tabName === currentTab && !force) return;
            if (!skipSave) saveTabData();
            closeAllCalendars(false);

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.setAttribute('aria-selected', 'false');
                btn.setAttribute('tabindex', '-1');
            });
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.querySelector(`[data-tab="${tabName}"]`).setAttribute('aria-selected', 'true');
            document.querySelector(`[data-tab="${tabName}"]`).setAttribute('tabindex', '0');

            currentTab = tabName;
            const panelRoot = document.getElementById('panel-root');

            // Fade out → clear → render → fade in, no layout jump
            panelRoot.style.transition = 'opacity 0.15s ease, transform 0.15s ease';
            panelRoot.style.opacity = '0';
            panelRoot.style.transform = 'translateY(6px)';

            setTimeout(() => {
                panelRoot.innerHTML = '';
                TAB_CONFIG[tabName].render(panelRoot);
                // After rendering, attach any post-render listeners
                if (tabName === 'interesses') {
                    const inp = panelRoot.querySelector('#interestInput');
                    if (inp) {
                        inp.addEventListener('keypress', (e) => {
                            if (e.key === 'Enter') { e.preventDefault(); addInterest(); }
                        }, { passive: false });
                    }
                }
                requestAnimationFrame(() => {
                    restoreTabData();
                    panelRoot.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
                    panelRoot.style.opacity = '1';
                    panelRoot.style.transform = 'translateY(0)';
                });
            }, 150);
        }

        function handleTabKeydown(e) {
            const buttons = Array.from(document.querySelectorAll('.tab-btn'));
            const index = buttons.indexOf(e.target);

            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                const prev = buttons[(index - 1 + buttons.length) % buttons.length];
                prev.focus();
                switchTab(prev.dataset.tab);
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                const next = buttons[(index + 1) % buttons.length];
                next.focus();
                switchTab(next.dataset.tab);

        function loadExternalScript(src) {
            return new Promise((resolve, reject) => {
                const existing = document.querySelector(`script[src="${src}"]`);
                if (existing) {
                    existing.addEventListener('load', resolve, { once: true });
                    existing.addEventListener('error', reject, { once: true });
                    if (existing.dataset.loaded === 'true') resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    script.dataset.loaded = 'true';
                    resolve();
                };
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function ensurePdfJs() {
            if (!window.pdfjsLib) {
                await loadExternalScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
            }
            if (window.pdfjsLib?.GlobalWorkerOptions) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
        }

        async function extractPdfText(file) {
            await ensurePdfJs();
            const buffer = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
            const pages = [];

            for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const content = await page.getTextContent();
                const rows = [];

                content.items.forEach(item => {
                    const x = item.transform[4];
                    const y = item.transform[5];
                    let row = rows.find(existing => Math.abs(existing.y - y) < 3);
                    if (!row) {
                        row = { y, items: [] };
                        rows.push(row);
                    }
                    row.items.push({ x, text: item.str });
                });

                rows
                    .sort((a, b) => b.y - a.y)
                    .forEach(row => {
                        const line = row.items
                            .sort((a, b) => a.x - b.x)
                            .map(item => item.text)
                            .join(' ')
                            .replace(/\s+/g, ' ')
                            .trim();
                        if (line) pages.push(line);
                    });
            }

            return pages.join('\n');
        }

        function stripHtml(text) {
            return String(text || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
        }

        function sectionText(lines, startPatterns, endPatterns) {
            const start = lines.findIndex(line => startPatterns.some(pattern => pattern.test(line)));
            if (start < 0) return '';
            const end = lines.findIndex((line, index) =>
                index > start && endPatterns.some(pattern => pattern.test(line))
            );
            return lines.slice(start + 1, end < 0 ? lines.length : end).join('\n').trim();
        }

        function splitSentences(text) {
            return String(text || '')
                .split(/\n|(?<=\.)\s+(?=[A-ZÁÉÍÓÚÂÊÔÃÕÇ])/)
                .map(item => item.trim())
                .filter(Boolean);
        }

        function findDateRange(line) {
            const date = '(\\d{1,2}[\\/.-]\\d{1,2}[\\/.-]\\d{2,4}|\\d{4}|presente|atual|actual)';
            const match = String(line || '').match(new RegExp(`${date}\\s*(?:-|–|—|a|até|ate)\\s*${date}`, 'i'));
            if (!match) return null;
            return { start: match[1], end: match[2], raw: match[0] };
        }

        function parseDateToIso(value) {
            const text = String(value || '').trim();
            if (!text || /presente|atual|actual/i.test(text)) return '';
            const dmy = text.match(/^(\d{1,2})[\\/.-](\d{1,2})[\\/.-](\d{2,4})$/);
            if (dmy) {
                const year = dmy[3].length === 2 ? '20' + dmy[3] : dmy[3];
                return `${year}-${dmy[2].padStart(2, '0')}-${dmy[1].padStart(2, '0')}`;
            }
            const yearOnly = text.match(/^\d{4}$/);
            if (yearOnly) return `${text}-01-01`;
            return '';
        }

        function detectLanguageLevel(value) {
            const text = String(value || '').toUpperCase();
            const match = text.match(/\b(A1|A2|B1|B2|C1|C2)\b/);
            if (match) return match[1];
            if (/NATIVO/.test(text)) return 'Nativo';
            if (/FLUENTE/.test(text)) return 'C2';
            if (/AVAN/.test(text)) return 'C1';
            if (/INTER/.test(text)) return 'B1';
            if (/BAS|ELEMENT/.test(text)) return 'A2';
            return '';
        }

        function parseExistingCvText(text) {
            const lines = String(text || '')
                .split(/\n+/)
                .map(line => line.replace(/\s+/g, ' ').trim())
                .filter(Boolean);

            const allText = lines.join('\n');
            const email = (allText.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i) || [''])[0];
            const phone = (allText.match(/(?:\+?\d[\d\s().-]{5,}\d)/) || [''])[0].replace(/\s+/g, ' ').trim();
            const postal = (allText.match(/\b\d{4}[-\s]?\d{3}\b/) || [''])[0];

            const getLabel = (labels) => {
                for (const line of lines) {
                    const clean = line.replace(/^[•\-\s]+/, '').replace(/^\d+\.\s*/, '').trim();
                    for (const label of labels) {
                        const match = clean.match(new RegExp(`^${label}\\s*:\\s*(.+)$`, 'i'));
                        if (match) return match[1].trim();
                    }
                }
                return '';
            };

            const nomeLabel = getLabel(['Nome']);
            const apelidoLabel = getLabel(['Apelido']);
            const telefoneLabel = getLabel(['Telefone']);
            const emailLabel = getLabel(['E-?mail', 'Email']);
            const enderecoLabel = getLabel(['Endere[cç]o', 'Morada']);
            const postalLabel = getLabel(['C[oó]digo\\s+Postal', 'Codigo\\s+Postal']);
            const cargoAtualLabel = getLabel(['Cargo\\s+Atual', 'Cargo']);
            const objetivoLabel = getLabel(['Objetivo', 'Objectivo']);

            const ignoredName = /curriculum|vitae|telefone|e-?mail|email|endereço|endereco|contacto|perfil|experi|educa|compet|idioma|página|pagina|gerado/i;
            const nameLine = lines.find(line =>
                line.length > 3 &&
                line.length < 70 &&
                /[A-Za-zÀ-ÿ]{2,}\s+[A-Za-zÀ-ÿ]{2,}/.test(line) &&
                !ignoredName.test(line) &&
                !line.includes('@') &&
                !/\d{2,}/.test(line)
            ) || '';

            const profile = sectionText(lines,
                [/perfil profissional/i, /^perfil$/i, /resumo profissional/i],
                [/cargo/i, /idioma/i, /experi/i, /educa/i, /compet/i, /skills/i, /forma/i]
            );
            const cargoText = sectionText(lines,
                [/cargo/i],
                [/idioma/i, /experi/i, /educa/i, /compet/i, /skills/i, /interess/i]
            );
            const languagesText = sectionText(lines,
                [/idioma/i],
                [/experi/i, /educa/i, /compet/i, /skills/i, /interess/i, /adicion/i]
            );

            const experienceText = sectionText(lines,
                [/experi/i],
                [/educa/i, /forma/i, /compet/i, /idioma/i, /interess/i, /informa/i]
            );
            const educationText = sectionText(lines,
                [/educa/i, /forma/i],
                [/compet/i, /skills/i, /idioma/i, /interess/i, /informa/i, /adicion/i]
            );
            const competenceText = sectionText(lines,
                [/compet/i, /skills/i],
                [/interess/i, /informa/i, /adicion/i]
            );
            const interestText = sectionText(lines,
                [/interess/i, /hobb/i],
                [/informa/i, /adicion/i]
            );

            const makeEntries = (blockText) => {
                const blockLines = blockText.split(/\n+/).map(line => line.trim()).filter(Boolean);
                const entries = [];
                let current = null;

                blockLines.forEach(line => {
                    const range = findDateRange(line);
                    if (range || (!current && line.length > 0)) {
                        if (current) entries.push(current);
                        current = { title: '', org: '', local: '', start: '', end: '', desc: [] };
                        if (range) {
                            current.start = parseDateToIso(range.start);
                            current.end = parseDateToIso(range.end);
                            line = line.replace(range.raw, '').trim();
                        }
                        current.title = line.replace(/^[-•]\s*/, '').trim();
                    } else if (current) {
                        if (!current.org && /universidade|instituto|empresa|ag[eê]ncia|school|college|lda|sa\b|sarl|horizonte|lisboa|praia/i.test(line)) {
                            const parts = line.split(/\s+[—-]\s+/);
                            current.org = parts[0] || line;
                            current.local = parts[1] || '';
                        } else {
                            current.desc.push(line.replace(/^[-•]\s*/, ''));
                        }
                    }
                });

                if (current) entries.push(current);
                return entries.filter(item => item.title || item.org || item.desc.length).slice(0, 8);
            };

            const languageSource = languagesText || allText;
            const languageLines = languageSource.split(/\n+/).filter(line => /\b(A1|A2|B1|B2|C1|C2|Fluente|Avan|Inter|Intermedi|B[aá]sico|Basico|Nativo|Ingl|Portugu|Espanhol|Franc)\b/i.test(line));
            const languages = languageLines
                .map(line => {
                    const name = (line.match(/\b(Portugu[eê]s|Ingl[eê]s|Franc[eê]s|Espanhol|Crioulo|Alem[aã]o|Italiano)\b/i) || [''])[0];
                    const levels = line.match(/\b(A1|A2|B1|B2|C1|C2)\b/gi) || [];
                    if (!name && levels.length === 0) return null;
                    const fallback = detectLanguageLevel(line);
                    return {
                        idioma: name || line.split(/\s+/)[0],
                        ouvir: levels[0] || fallback,
                        ler: levels[1] || levels[0] || fallback,
                        interacao: levels[2] || levels[0] || fallback,
                        producao: levels[3] || levels[0] || fallback,
                        escrever: levels[4] || levels[0] || fallback
                    };
                })
                .filter(Boolean)
                .slice(0, 5);

            return {
                nome: nameLine,
                telefone: phone,
                email,
                endereco: '',
                postal,
                perfil: profile,
                experiencias: makeEntries(experienceText),
                educacao: makeEntries(educationText),
                competencias: splitSentences(competenceText).slice(0, 10),
                interesses: splitSentences(interestText).slice(0, 10),
                idiomas: languages
            };
        }

        function parseExistingCvTextV2(text) {
            const rawLines = String(text || '')
                .split(/\n+/)
                .map(line => line.replace(/\s+/g, ' ').trim())
                .filter(Boolean);

            const normalizeText = (value) => String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .trim();

            const cleanLine = (line) => String(line || '')
                .replace(/^\s*\d+[.)]\s*/, '')
                .replace(/^[\s\-\*\u2022\uFFFD?]+/, '')
                .replace(/^o\s+/i, '')
                .trim();

            const headingDefs = [
                { key: 'info', names: ['informacoes pessoais', 'dados pessoais'] },
                { key: 'perfil', names: ['perfil', 'perfil profissional', 'resumo profissional'] },
                { key: 'cargo', names: ['cargo', 'cargo pretendido', 'objetivo profissional'] },
                { key: 'idiomas', names: ['idiomas', 'linguas'] },
                { key: 'experiencia', names: ['experiencia', 'experiencia profissional'] },
                { key: 'educacao', names: ['educacao', 'formacao', 'educacao e formacao'] },
                { key: 'competencias', names: ['competencias', 'skills', 'habilidades'] },
                { key: 'interesses', names: ['interesses', 'hobbies'] },
                { key: 'adicionais', names: ['adicionais', 'informacoes adicionais'] }
            ];

            const headingKey = (line) => {
                const numbered = /^\s*\d+[.)]\s*/.test(line);
                const cleaned = cleanLine(line);
                const norm = normalizeText(cleaned);
                for (const def of headingDefs) {
                    if (def.names.some(name => norm === name || (numbered && (norm.startsWith(name + ' ') || norm.startsWith(name.slice(0, 5)))))) return def.key;
                }
                return '';
            };

            const sectionLines = (key) => {
                const found = [];
                let active = false;
                rawLines.forEach(line => {
                    const currentKey = headingKey(line);
                    if (currentKey) {
                        active = currentKey === key;
                        return;
                    }
                    if (active) found.push(line);
                });
                return found;
            };

            const getLabel = (labels) => {
                const labelSet = labels.map(normalizeText);
                for (let index = 0; index < rawLines.length; index += 1) {
                    const line = rawLines[index];
                    const cleaned = cleanLine(line);
                    const colon = cleaned.indexOf(':');
                    if (colon === -1) continue;
                    const key = normalizeText(cleaned.slice(0, colon));
                    if (labelSet.some(label => key === label || key.startsWith(label) || label.startsWith(key) || key.slice(0, 5) === label.slice(0, 5))) {
                        let value = cleaned.slice(colon + 1).trim();
                        for (let next = index + 1; next < rawLines.length; next += 1) {
                            const nextLine = rawLines[next];
                            const nextClean = cleanLine(nextLine);
                            if (!nextClean || headingKey(nextLine) || /^\s*(?:[\-\*\u2022\uFFFD?]|\d+[.)])/i.test(nextLine) || nextClean.includes(':')) break;
                            value += ' ' + nextClean;
                        }
                        return value.trim();
                    }
                }
                return '';
            };

            const allText = rawLines.join('\n');
            const email = getLabel(['email', 'e-mail']) || (allText.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i) || [''])[0];
            const phone = getLabel(['telefone', 'telemovel', 'celular']) || ((allText.match(/(?:\+?\d[\d\s().-]{5,}\d)/) || [''])[0].replace(/\s+/g, ' ').trim());
            const postal = getLabel(['codigo postal', 'cod postal']) || (allText.match(/\b\d{4}[-\s]?\d{3}\b/) || [''])[0];

            const nome = getLabel(['nome']);
            const apelido = getLabel(['apelido']);
            const endereco = getLabel(['endereco', 'morada']);
            const cargoAtual = getLabel(['cargo atual', 'cargo']);
            const objetivo = getLabel(['objetivo', 'objectivo']);

            const profile = sectionLines('perfil').join(' ').trim();
            const unique = (items) => [...new Set(items.map(item => String(item || '').trim()).filter(Boolean))];
            const cargos = unique([cargoAtual, objetivo]);

            const levelFromText = (value) => {
                const upper = String(value || '').toUpperCase();
                const coded = upper.match(/\b(A1|A2|B1|B2|C1|C2)\b/);
                if (coded) return coded[1];
                const norm = normalizeText(value);
                if (norm.includes('nativo')) return 'Nativo';
                if (norm.includes('fluente')) return 'C2';
                if (norm.includes('avanc')) return 'C1';
                if (norm.includes('intermedi')) return 'B1';
                if (norm.includes('basico') || /b.sico/.test(norm)) return 'A2';
                if (norm.includes('elementar')) return 'A1';
                return '';
            };

            const idiomaNames = [
                { stem: 'portugu', label: 'Portugues' },
                { stem: 'ingl', label: 'Ingles' },
                { stem: 'espanh', label: 'Espanhol' },
                { stem: 'franc', label: 'Frances' },
                { stem: 'crioulo', label: 'Crioulo' },
                { stem: 'alema', label: 'Alemao' },
                { stem: 'itali', label: 'Italiano' }
            ];
            const languageLines = sectionLines('idiomas').filter(line => {
                const norm = normalizeText(line);
                return idiomaNames.some(item => norm.includes(item.stem)) || /\b(A1|A2|B1|B2|C1|C2)\b/i.test(line);
            });

            const languages = languageLines.map(line => {
                const cleaned = cleanLine(line);
                const norm = normalizeText(cleaned);
                const matchedName = idiomaNames.find(item => norm.includes(item.stem));
                const readableName = matchedName ? matchedName.label : cleaned.replace(/\(.+\)/, '').trim();
                const level = levelFromText(cleaned);
                if (!readableName || !level) return null;
                return {
                    idioma: readableName,
                    ouvir: level,
                    ler: level,
                    interacao: level,
                    producao: level,
                    escrever: level
                };
            }).filter(Boolean).slice(0, 5);

            const parseExperience = () => {
                const entries = [];
                let current = null;
                sectionLines('experiencia').forEach(line => {
                    const cleaned = cleanLine(line);
                    const match = cleaned.match(/^(\d{4}|\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4})\s*(?:[\u2013\u2014\-?]|\ba\b|ate|at[eé])\s*(\d{4}|presente|atual|actual|\d{1,2}[\/.-]\d{1,2}[\/.-]\d{2,4})\s*:?\s*(.*)$/i);
                    if (match) {
                        if (current) entries.push(current);
                        const rest = match[3].trim();
                        const parts = rest.split(/\s+[\u2013\u2014\-?]\s+/);
                        current = {
                            title: (parts[0] || rest || 'Experiencia').trim(),
                            org: '',
                            local: '',
                            start: parseDateToIso(match[1]),
                            end: parseDateToIso(match[2]),
                            desc: parts.slice(1).join(' - ') ? [parts.slice(1).join(' - ')] : []
                        };
                    } else if (current && cleaned) {
                        current.desc.push(cleaned);
                    }
                });
                if (current) entries.push(current);
                return entries.slice(0, 8);
            };

            const bulletItems = (key) => {
                const items = [];
                sectionLines(key).forEach(line => {
                    const startsBullet = /^\s*(?:[\-\*\u2022\uFFFD?]|o\s+)/i.test(line);
                    const cleaned = cleanLine(line);
                    if (!cleaned) return;
                    if (startsBullet || !items.length) items.push(cleaned);
                    else items[items.length - 1] += ' ' + cleaned;
                });
                return items.map(item => item.trim()).filter(Boolean);
            };

            const education = bulletItems('educacao').map(item => ({
                title: item,
                org: '',
                local: '',
                start: '',
                end: '',
                desc: []
            })).slice(0, 8);

            return {
                nome: nome || '',
                apelido,
                telefone: phone,
                email,
                endereco,
                postal,
                cargos,
                perfil: profile,
                experiencias: parseExperience(),
                educacao: education,
                competencias: bulletItems('competencias').slice(0, 10),
                interesses: bulletItems('interesses').slice(0, 10),
                adicionais: bulletItems('adicionais').slice(0, 12),
                idiomas: languages
            };
        }

        function parseLooseCvText(text) {
            const rawLines = String(text || '')
                .split(/\n+/)
                .map(line => line.replace(/\s+/g, ' ').trim())
                .filter(Boolean);

            const normalizeText = (value) => String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .trim();

            const cleanLine = (line) => String(line || '')
                .replace(/^[\s\-\*\u2022\uFFFD?]+/, '')
                .replace(/\s+/g, ' ')
                .trim();

            const allText = rawLines.join('\n');
            const email = (allText.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i) || [''])[0];
            const telefone = ((allText.match(/(?:\+?\d[\d\s().-]{5,}\d)/) || [''])[0] || '').replace(/\s+/g, ' ').trim();
            const postal = (allText.match(/\b\d{4}[-\s]?\d{3}\b/) || [''])[0];

            const blocked = /curriculum|vitae|cv\b|contacto|contato|telefone|telemovel|email|e-mail|endere|morada|codigo|perfil|experiencia|educacao|formacao|competencia|idioma|interesse|pagina|gerado|creativeflow/i;
            const likelyName = rawLines.slice(0, 35)
                .map(cleanLine)
                .find(line => {
                    if (!line || line.length < 5 || line.length > 70) return false;
                    if (blocked.test(normalizeText(line))) return false;
                    if (line.includes('@') || /\d{2,}/.test(line)) return false;
                    return /[A-Za-zÀ-ÿ]{2,}\s+[A-Za-zÀ-ÿ]{2,}/.test(line);
                }) || '';

            const labelAfter = (labels) => {
                const labelSet = labels.map(normalizeText);
                for (let i = 0; i < rawLines.length; i += 1) {
                    const clean = cleanLine(rawLines[i]);
                    const norm = normalizeText(clean).replace(/:$/, '');
                    const colon = clean.indexOf(':');
                    if (colon >= 0) {
                        const key = normalizeText(clean.slice(0, colon));
                        if (labelSet.some(label => key === label || key.includes(label))) {
                            return clean.slice(colon + 1).trim();
                        }
                    }
                    if (labelSet.some(label => norm === label || norm.includes(label))) {
                        const next = cleanLine(rawLines[i + 1] || '');
                        if (next && !blocked.test(normalizeText(next))) return next;
                    }
                }
                return '';
            };

            const endereco = labelAfter(['endereco', 'morada', 'address']);
            const cargo = labelAfter(['cargo', 'cargo pretendido', 'objetivo profissional', 'funcao']);

            return {
                nome: likelyName,
                apelido: '',
                telefone,
                email,
                endereco,
                postal,
                cargos: cargo ? [cargo] : [],
                perfil: '',
                experiencias: [],
                educacao: [],
                competencias: [],
                interesses: [],
                adicionais: [],
                idiomas: []
            };
        }

        function mergeParsedCv(primary, fallback) {
            const merged = { ...primary };
            ['nome', 'apelido', 'telefone', 'email', 'endereco', 'postal', 'perfil'].forEach(key => {
                if (!merged[key] && fallback[key]) merged[key] = fallback[key];
            });
            ['cargos', 'experiencias', 'educacao', 'competencias', 'interesses', 'adicionais', 'idiomas'].forEach(key => {
                if ((!merged[key] || merged[key].length === 0) && fallback[key] && fallback[key].length) {
                    merged[key] = fallback[key];
                }
            });
            return merged;
        }

        function setMemoryValue(name, value, index = 0) {
            if (value === undefined || value === null || value === '') return;
            formMemory[`${name}_${index}`] = value;
        }

        function setRichMemory(name, value, index = 0) {
            if (!value) return;
            const html = String(value).includes('<') ? String(value) : `<p>${String(value).replace(/\n+/g, '</p><p>')}</p>`;
            setMemoryValue(name, html, index);
            formMemory[`rich_${name}_${index}`] = html;
        }

        function fillFormFromParsedCv(parsed) {
            if (parsed.nome) setMemoryValue('nome', parsed.nome, 0);
            if (parsed.apelido) setMemoryValue('apelido', parsed.apelido, 0);
            if (parsed.telefone) setMemoryValue('telefone', parsed.telefone, 0);
            if (parsed.email) setMemoryValue('email', parsed.email, 0);
            if (parsed.endereco) setMemoryValue('endereco', parsed.endereco, 0);
            if (parsed.postal) setMemoryValue('postal', parsed.postal, 0);
            if (parsed.perfil) setRichMemory('perfil_profissional', parsed.perfil, 0);

            if (parsed.cargos && parsed.cargos.length) {
                formMemory[repeatKey('cargo')] = parsed.cargos.length;
                parsed.cargos.forEach((item, index) => {
                    setMemoryValue('cargo_pretendido[]', item, index);
                });
            }

            if (parsed.experiencias.length) {
                formMemory[repeatKey('experiencia')] = parsed.experiencias.length;
                parsed.experiencias.forEach((item, index) => {
                    setMemoryValue('exp_inicio[]', item.start, index);
                    setMemoryValue('exp_fim[]', item.end, index);
                    setMemoryValue('exp_funcao[]', item.title, index);
                    setMemoryValue('exp_empresa[]', item.org, index);
                    setMemoryValue('exp_local[]', item.local, index);
                    setRichMemory('exp_descricao[]', item.desc.join('\n'), index);
                });
            }

            if (parsed.educacao.length) {
                formMemory[repeatKey('educacao')] = parsed.educacao.length;
                parsed.educacao.forEach((item, index) => {
                    setMemoryValue('edu_inicio[]', item.start, index);
                    setMemoryValue('edu_fim[]', item.end, index);
                    setMemoryValue('edu_curso[]', item.title, index);
                    setMemoryValue('edu_inst[]', item.org, index);
                    setMemoryValue('edu_local[]', item.local, index);
                });
            }

            if (parsed.idiomas.length) {
                formMemory[repeatKey('idiomas')] = parsed.idiomas.length;
                parsed.idiomas.forEach((item, index) => {
                    setMemoryValue('idioma[]', item.idioma, index);
                    setMemoryValue('idioma_ouvir[]', item.ouvir, index);
                    setMemoryValue('idioma_ler[]', item.ler, index);
                    setMemoryValue('idioma_interacao[]', item.interacao, index);
                    setMemoryValue('idioma_producao[]', item.producao, index);
                    setMemoryValue('idioma_escrever[]', item.escrever, index);
                });
            }

            if (parsed.competencias.length) {
                formMemory[repeatKey('competencias')] = parsed.competencias.length;
                parsed.competencias.forEach((item, index) => {
                    setMemoryValue('comp_tipo[]', stripHtml(item), index);
                    setMemoryValue('comp_nivel[]', '', index);
                });
            }

            if (parsed.interesses.length) {
                formMemory.interests = parsed.interesses.map(stripHtml);
            }

            if (parsed.adicionais && parsed.adicionais.length) {
                setRichMemory('observacoes', parsed.adicionais.map(stripHtml).join('\n'), 0);
            }
        }

        async function handleExistingCvUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!/pdf$/i.test(file.name) && file.type !== 'application/pdf') {
                alert('Por agora a importação automática lê apenas PDF com texto selecionável.');
                return;
            }

            const btn = e.target.closest('.top-buttons')?.querySelector('.btn-outline');
            const original = btn ? btn.innerHTML : '';
            if (btn) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A ler CV...';
                btn.disabled = true;
            }

            try {
                const text = await extractPdfText(file);
                if (!text || text.replace(/\s+/g, '').length < 40) {
                    alert('Não consegui extrair texto suficiente desse PDF. Se for um PDF digitalizado/imagem, será preciso OCR.');
                    return;
                }

                const parsed = mergeParsedCv(parseExistingCvTextV2(text), parseLooseCvText(text));
                fillFormFromParsedCv(parsed);

                switchTab('info', { skipSave: true, force: true });
                setTimeout(restoreTabData, 240);

                const filled = [
                    parsed.nome && 'nome',
                    parsed.email && 'email',
                    parsed.telefone && 'telefone',
                    parsed.perfil && 'perfil',
                    parsed.experiencias.length && `${parsed.experiencias.length} experiência(s)`,
                    parsed.educacao.length && `${parsed.educacao.length} formação(ões)`,
                    parsed.idiomas.length && `${parsed.idiomas.length} idioma(s)`,
                    parsed.competencias.length && `${parsed.competencias.length} competência(s)`
                ].filter(Boolean).join(', ');

                alert(filled ? `CV importado. Revê os campos preenchidos: ${filled}.` : 'CV lido, mas não consegui identificar campos automaticamente. Podes preencher manualmente.');
            } catch (err) {
                alert('Não foi possível ler o CV: ' + err.message);
            } finally {
                if (btn) {
                    btn.innerHTML = original;
                    btn.disabled = false;
                }
            }
        }

        function ensurePhotoEditor() {
            let modal = document.getElementById('photoEditorModal');
            if (modal) return modal;

            modal = document.createElement('div');
            modal.id = 'photoEditorModal';
            modal.className = 'photo-editor-modal';
            modal.setAttribute('aria-hidden', 'true');
            modal.innerHTML = `
                <div class="photo-editor-panel" role="dialog" aria-modal="true" aria-label="Ajustar foto do perfil">
                    <div class="photo-editor-head">
                        <div>
                            <div class="photo-editor-title">Ajustar foto do perfil</div>
                        </div>
                        <button type="button" class="photo-editor-close" id="photoEditorClose" title="Fechar">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="photo-crop-stage" id="photoCropStage" title="Arraste a foto para enquadrar">
                        <canvas id="photoCropCanvas" width="${PHOTO_EDITOR_SIZE}" height="${PHOTO_EDITOR_SIZE}"></canvas>
                    </div>
                    <div class="photo-editor-controls">
                        <button type="button" class="photo-editor-icon-btn" id="photoZoomOut" title="Diminuir zoom">
                            <i class="fas fa-minus"></i>
                        </button>
                        <input type="range" id="photoZoomRange" min="1" max="3" step="0.01" value="1" aria-label="Zoom da foto">
                        <button type="button" class="photo-editor-icon-btn" id="photoZoomIn" title="Aumentar zoom">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button type="button" class="photo-editor-icon-btn" id="photoResetCrop" title="Repor enquadramento">
                            <i class="fas fa-rotate-left"></i>
                        </button>
                    </div>
                    <div class="photo-editor-actions">
                        <button type="button" class="photo-editor-action" id="photoCancelCrop">Cancelar</button>
                        <button type="button" class="photo-editor-action primary" id="photoUseCrop">
                            <i class="fas fa-check"></i> Usar foto
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            const stage = modal.querySelector('#photoCropStage');
            const zoomRange = modal.querySelector('#photoZoomRange');

            modal.querySelector('#photoEditorClose').addEventListener('click', cancelPhotoEditor);
            modal.querySelector('#photoCancelCrop').addEventListener('click', cancelPhotoEditor);
            modal.querySelector('#photoUseCrop').addEventListener('click', confirmPhotoCrop);
            modal.querySelector('#photoZoomOut').addEventListener('click', () => setPhotoZoom((photoEditState?.zoom || 1) - 0.08));
            modal.querySelector('#photoZoomIn').addEventListener('click', () => setPhotoZoom((photoEditState?.zoom || 1) + 0.08));
            modal.querySelector('#photoResetCrop').addEventListener('click', resetPhotoCrop);
            zoomRange.addEventListener('input', () => setPhotoZoom(Number(zoomRange.value)));

            stage.addEventListener('pointerdown', (e) => {
                if (!photoEditState) return;
                e.preventDefault();
                stage.setPointerCapture(e.pointerId);
                photoEditState.dragging = true;
                photoEditState.startX = e.clientX;
                photoEditState.startY = e.clientY;
                photoEditState.startOffsetX = photoEditState.offsetX;
                photoEditState.startOffsetY = photoEditState.offsetY;
            });

            stage.addEventListener('pointermove', (e) => {
                if (!photoEditState || !photoEditState.dragging) return;
                photoEditState.offsetX = photoEditState.startOffsetX + (e.clientX - photoEditState.startX);
                photoEditState.offsetY = photoEditState.startOffsetY + (e.clientY - photoEditState.startY);
                clampPhotoCrop();
                drawPhotoCropPreview();
            });

            stage.addEventListener('pointerup', (e) => {
                if (!photoEditState) return;
                photoEditState.dragging = false;
                try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
            });

            stage.addEventListener('pointercancel', () => {
                if (photoEditState) photoEditState.dragging = false;
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) cancelPhotoEditor();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('open')) cancelPhotoEditor();
            });

            return modal;
        }

        function openPhotoEditor(img, file) {
            const modal = ensurePhotoEditor();
            photoEditState = {
                img,
                file,
                zoom: 1,
                offsetX: 0,
                offsetY: 0,
                dragging: false
            };
            modal.querySelector('#photoZoomRange').value = '1';
            modal.classList.add('open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            drawPhotoCropPreview();
        }

        function cancelPhotoEditor() {
            const modal = document.getElementById('photoEditorModal');
            if (modal) {
                modal.classList.remove('open');
                modal.setAttribute('aria-hidden', 'true');
            }
            document.body.style.overflow = '';
            photoEditState = null;
            const input = document.getElementById('photoInput');
            if (input && !uploadedPhoto) input.value = '';
        }

        function setPhotoZoom(value) {
            if (!photoEditState) return;
            photoEditState.zoom = Math.min(3, Math.max(1, value));
            const range = document.getElementById('photoZoomRange');
            if (range) range.value = String(photoEditState.zoom);
            clampPhotoCrop();
            drawPhotoCropPreview();
        }

        function resetPhotoCrop() {
            if (!photoEditState) return;
            photoEditState.zoom = 1;
            photoEditState.offsetX = 0;
            photoEditState.offsetY = 0;
            const range = document.getElementById('photoZoomRange');
            if (range) range.value = '1';
            drawPhotoCropPreview();
        }

        function getPhotoDrawMetrics(size = PHOTO_EDITOR_SIZE) {
            if (!photoEditState) return null;
            const { img, zoom, offsetX, offsetY } = photoEditState;
            const baseScale = Math.max(size / img.width, size / img.height);
            const scale = baseScale * zoom;
            const width = img.width * scale;
            const height = img.height * scale;
            return {
                x: (size - width) / 2 + offsetX * (size / PHOTO_EDITOR_SIZE),
                y: (size - height) / 2 + offsetY * (size / PHOTO_EDITOR_SIZE),
                width,
                height
            };
        }

        function clampPhotoCrop() {
            if (!photoEditState) return;
            const metrics = getPhotoDrawMetrics(PHOTO_EDITOR_SIZE);
            const maxX = Math.max(0, (metrics.width - PHOTO_EDITOR_SIZE) / 2);
            const maxY = Math.max(0, (metrics.height - PHOTO_EDITOR_SIZE) / 2);
            photoEditState.offsetX = Math.min(maxX, Math.max(-maxX, photoEditState.offsetX));
            photoEditState.offsetY = Math.min(maxY, Math.max(-maxY, photoEditState.offsetY));
        }

        function drawPhotoCropPreview() {
            if (!photoEditState) return;
            const canvas = document.getElementById('photoCropCanvas');
            const ctx = canvas.getContext('2d');
            const metrics = getPhotoDrawMetrics(PHOTO_EDITOR_SIZE);
            ctx.clearRect(0, 0, PHOTO_EDITOR_SIZE, PHOTO_EDITOR_SIZE);
            ctx.fillStyle = '#d8e1ef';
            ctx.fillRect(0, 0, PHOTO_EDITOR_SIZE, PHOTO_EDITOR_SIZE);
            ctx.drawImage(photoEditState.img, metrics.x, metrics.y, metrics.width, metrics.height);
        }

        function confirmPhotoCrop() {
            if (!photoEditState) return;

            const canvas = document.createElement('canvas');
            canvas.width = PHOTO_EXPORT_SIZE;
            canvas.height = PHOTO_EXPORT_SIZE;
            const ctx = canvas.getContext('2d');
            const metrics = getPhotoDrawMetrics(PHOTO_EXPORT_SIZE);

            ctx.clearRect(0, 0, PHOTO_EXPORT_SIZE, PHOTO_EXPORT_SIZE);
            ctx.drawImage(photoEditState.img, metrics.x, metrics.y, metrics.width, metrics.height);

            const dataUrl = canvas.toDataURL('image/webp', 0.82);
            const mimeMatch = dataUrl.match(/^data:(.*?);base64,/);
            const tipo = mimeMatch ? mimeMatch[1] : 'image/webp';
            uploadedPhoto = {
                nome: photoEditState.file.name,
                tipo,
                largura: PHOTO_PROFILE_SIZE,
                altura: PHOTO_PROFILE_SIZE,
                export_largura: PHOTO_EXPORT_SIZE,
                export_altura: PHOTO_EXPORT_SIZE,
                dataUrl,
                base64: dataUrl.split(',')[1]
            };

            const modal = document.getElementById('photoEditorModal');
            if (modal) {
                modal.classList.remove('open');
                modal.setAttribute('aria-hidden', 'true');
            }
            document.body.style.overflow = '';
            photoEditState = null;
            updatePhotoButtonState();
        }

        function removePhoto() {
            uploadedPhoto = null;
            const input = document.getElementById('photoInput');
            if (input) input.value = '';
            updatePhotoButtonState();
        }
