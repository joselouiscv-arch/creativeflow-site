<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar CV - CreativeFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes shimmerSweep {
            0%   { transform: translateX(-120%) skewX(-15deg); opacity: 0; }
            30%  { opacity: 1; }
            100% { transform: translateX(250%) skewX(-15deg); opacity: 0; }
        }
        @keyframes headerPulse {
            0%,100% { box-shadow: 0 6px 30px rgba(15,40,120,0.5), inset 0 1.5px 0 rgba(255,255,255,0.22), inset 0 -1px 0 rgba(0,15,80,0.35); }
            50%      { box-shadow: 0 10px 44px rgba(15,40,120,0.68), inset 0 1.5px 0 rgba(255,255,255,0.32), inset 0 -1px 0 rgba(0,15,80,0.2); }
        }
        @keyframes cardReveal {
            0%   { opacity: 0; transform: translateY(-14px) scaleY(0.94); filter: blur(4px); }
            60%  { filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scaleY(1); filter: blur(0); }
        }
        @keyframes inputGlow {
            0%   { box-shadow: 0 0 0 0 rgba(27,67,220,0.15), 0 2px 8px rgba(27,47,110,0.07); }
            100% { box-shadow: 0 0 0 5px rgba(27,67,220,0.10), 0 6px 24px rgba(27,47,110,0.16); }
        }
        @keyframes orb1 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%     { transform: translate(4%,6%) scale(1.08); }
        }
        @keyframes orb2 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%     { transform: translate(-5%,-4%) scale(1.05); }
        }
        @keyframes cardFloat {
            0%,100% { transform: translateY(0px); }
            50%     { transform: translateY(-3px); }
        }
        @keyframes submitBreath {
            0%,100% { box-shadow: 0 8px 28px rgba(15,40,130,0.38), inset 0 1.5px 0 rgba(255,255,255,0.25); }
            50%     { box-shadow: 0 14px 44px rgba(15,40,130,0.55), inset 0 1.5px 0 rgba(255,255,255,0.38); }
        }
        @keyframes calDrop {
            0%   { opacity: 0; transform: translateY(-10px) scaleY(0.88); transform-origin: top center; filter: blur(5px); }
            55%  { filter: blur(0); }
            80%  { transform: translateY(2px) scaleY(1.01); transform-origin: top center; }
            100% { opacity: 1; transform: translateY(0) scaleY(1); transform-origin: top center; filter: blur(0); }
        }
        @keyframes calClose {
            0%   { opacity: 1; transform: translateY(0) scaleY(1); transform-origin: top center; }
            100% { opacity: 0; transform: translateY(-8px) scaleY(0.88); transform-origin: top center; filter: blur(4px); }
        }
        @keyframes tabSlideLeft {
            0%   { opacity: 0; transform: translateX(28px) scale(0.97); filter: blur(3px); }
            60%  { filter: blur(0); }
            100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        }
        @keyframes tabSlideRight {
            0%   { opacity: 0; transform: translateX(-28px) scale(0.97); filter: blur(3px); }
            60%  { filter: blur(0); }
            100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        }
        @keyframes tabFadeOut {
            0%   { opacity: 1; transform: translateX(0) scale(1); }
            100% { opacity: 0; transform: translateX(-18px) scale(0.97); filter: blur(3px); }
        }
        @keyframes calDayIn {
            0%   { opacity: 0; transform: scale(0.6); }
            70%  { transform: scale(1.08); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes ambientSweep {
            0%,100% { transform: translate3d(-2%, -1%, 0) rotate(0deg); opacity: 0.75; }
            50% { transform: translate3d(2%, 1%, 0) rotate(1deg); opacity: 0.95; }
        }
        @keyframes liveWallpaperFlow {
            0% { background-position: 0% 40%, 100% 20%, 50% 100%; }
            50% { background-position: 100% 60%, 0% 80%, 35% 0%; }
            100% { background-position: 0% 40%, 100% 20%, 50% 100%; }
        }
        @keyframes introWaveDrift {
            0%,100% { transform: translate3d(-4%, 1%, 0) rotate(-2deg) scale(1.03); opacity: 0.82; }
            50% { transform: translate3d(4%, -2%, 0) rotate(2deg) scale(1.08); opacity: 1; }
        }
        @keyframes introGlassLight {
            0%,100% { transform: translateX(-18%) rotate(-8deg); opacity: 0.22; }
            50% { transform: translateX(18%) rotate(8deg); opacity: 0.38; }
        }
        @keyframes introPanelIn {
            0% { opacity: 0; transform: translateY(26px) scale(0.96); filter: blur(14px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes introBeam {
            0% { transform: translateX(-18%) rotate(-8deg); opacity: 0.4; }
            50% { transform: translateX(18%) rotate(8deg); opacity: 0.8; }
            100% { transform: translateX(-18%) rotate(-8deg); opacity: 0.4; }
        }
        @keyframes introExit {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.04); filter: blur(18px); visibility: hidden; }
        }
        @keyframes shellReveal {
            0% { opacity: 0; transform: translateY(32px) scale(0.97); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes navItemReveal {
            0% { opacity: 0; transform: translateX(-22px) scale(0.92); filter: blur(6px); }
            100% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
        }
        @keyframes logoReveal {
            0% { opacity: 0; transform: translateY(34px) scale(2.55); filter: blur(18px); }
            16% { opacity: 1; transform: translateY(8px) scale(2.25); filter: blur(4px); }
            42% { opacity: 1; transform: translateY(0) scale(2.08); filter: blur(0); }
            70% { opacity: 1; transform: translateY(-3px) scale(1.18); filter: blur(0); }
            88% { opacity: 1; transform: translateY(1px) scale(0.98); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes logoBreath {
            0%,100% { transform: translateY(0) scale(1); filter: drop-shadow(0 18px 38px rgba(30,120,255,0.26)); }
            50% { transform: translateY(-4px) scale(1.012); filter: drop-shadow(0 24px 52px rgba(50,190,255,0.34)); }
        }
        @keyframes softSpringIn {
            0% { opacity: 0; transform: translateY(22px) scale(0.92); filter: blur(8px); }
            72% { opacity: 1; transform: translateY(-3px) scale(1.018); filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes borderRun {
            0% { transform: translateX(-140%); opacity: 0; }
            18% { opacity: 0.8; }
            100% { transform: translateX(140%); opacity: 0; }
        }
        @keyframes actionGlow {
            0%,100% { box-shadow: 0 18px 42px rgba(30,80,220,0.28), inset 0 1.5px 0 rgba(255,255,255,0.22); }
            50% { box-shadow: 0 24px 62px rgba(30,150,255,0.42), inset 0 1.5px 0 rgba(255,255,255,0.34); }
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(27,47,110,0.18); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(27,47,110,0.32); }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: #0f1c3f;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            background:
                radial-gradient(ellipse 80% 60% at 10% 10%, rgba(160,195,255,0.55) 0%, transparent 60%),
                radial-gradient(ellipse 65% 55% at 90% 85%, rgba(180,215,255,0.42) 0%, transparent 60%),
                radial-gradient(ellipse 50% 45% at 55% 50%, rgba(210,230,255,0.25) 0%, transparent 70%),
                linear-gradient(165deg, #f0f5ff 0%, #e2ecfb 30%, #eaf2fd 60%, #f5f8ff 100%);
        }

        body.intro-active {
            overflow: hidden;
        }

        .intro-screen {
            position: fixed;
            inset: 0;
            z-index: 5000;
            display: grid;
            place-items: center;
            padding: 24px;
            overflow: hidden;
            background:
                linear-gradient(115deg, rgba(255,255,255,0.90) 0%, rgba(236,246,255,0.82) 36%, rgba(214,232,255,0.70) 100%),
                linear-gradient(150deg, rgba(255,255,255,0.58), rgba(35,103,255,0.12) 50%, rgba(90,220,255,0.16) 100%);
            background-size: 130% 130%, 160% 160%;
            animation: liveWallpaperFlow 18s ease-in-out infinite;
        }

        .intro-screen::before,
        .intro-screen::after {
            content: '';
            position: absolute;
            inset: -20%;
            pointer-events: none;
        }

        .intro-screen::before {
            background:
                linear-gradient(118deg, transparent 7%, rgba(255,255,255,0.72) 19%, rgba(83,145,255,0.42) 31%, rgba(255,255,255,0.58) 42%, transparent 58%),
                linear-gradient(132deg, transparent 32%, rgba(56,106,255,0.42) 46%, rgba(170,230,255,0.45) 55%, transparent 72%),
                linear-gradient(22deg, transparent 16%, rgba(42,93,255,0.14) 31%, rgba(255,255,255,0.54) 44%, transparent 62%);
            filter: blur(22px);
            animation: introWaveDrift 16s ease-in-out infinite;
        }

        .intro-screen::after {
            background-image:
                linear-gradient(112deg, transparent 24%, rgba(255,255,255,0.34) 45%, transparent 66%),
                linear-gradient(rgba(35,95,210,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(35,95,210,0.022) 1px, transparent 1px);
            background-size: 100% 100%, 58px 58px, 58px 58px;
            mask-image: linear-gradient(180deg, rgba(0,0,0,0.72), rgba(0,0,0,0.46));
            opacity: 0.78;
            animation: introGlassLight 14s ease-in-out infinite;
        }

        .intro-card {
            width: min(760px, 100%);
            min-height: 520px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 54px 46px;
            border: 1px solid rgba(255,255,255,0.70);
            border-radius: 40px;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.54), rgba(226,242,255,0.24)),
                linear-gradient(35deg, rgba(255,255,255,0.30), rgba(60,130,255,0.12));
            backdrop-filter: blur(36px) saturate(165%);
            -webkit-backdrop-filter: blur(36px) saturate(165%);
            box-shadow:
                0 38px 120px rgba(80,125,190,0.22),
                0 12px 44px rgba(30,90,180,0.12),
                inset 0 1.5px 0 rgba(255,255,255,0.95),
                inset 0 -1px 0 rgba(120,170,235,0.28);
            animation: introPanelIn 0.9s cubic-bezier(0.16,1,0.28,1) both;
            overflow: hidden;
        }

        .intro-card::before {
            content: '';
            position: absolute;
            inset: 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.42);
            box-shadow: inset 0 0 42px rgba(255,255,255,0.12);
            pointer-events: none;
        }

        .intro-cv-ghost {
            position: absolute;
            right: 42px;
            top: 46px;
            width: 138px;
            height: 176px;
            border-radius: 24px;
            background: linear-gradient(160deg, rgba(255,255,255,0.34), rgba(78,145,255,0.11));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.62), 0 22px 60px rgba(65,115,210,0.14);
            opacity: 0.50;
        }

        .intro-cv-ghost::before,
        .intro-cv-ghost::after {
            content: '';
            position: absolute;
            left: 20px;
            right: 20px;
            height: 8px;
            border-radius: 999px;
            background: rgba(66,132,255,0.20);
            box-shadow: 0 26px 0 rgba(66,132,255,0.16), 0 52px 0 rgba(66,132,255,0.12), 0 78px 0 rgba(66,132,255,0.10);
        }

        .intro-cv-ghost::before { top: 30px; }
        .intro-cv-ghost::after { top: 118px; width: 46px; right: auto; background: rgba(38,105,255,0.22); box-shadow: none; }

        .intro-logo-wrap {
            width: min(340px, 72vw);
            position: relative;
            z-index: 1;
            transform-origin: center;
            animation: logoReveal 2.2s cubic-bezier(0.13,1,0.18,1) both, logoBreath 5.2s ease-in-out 2.35s infinite;
        }

        .intro-logo-wrap::after {
            content: '';
            position: absolute;
            inset: -16%;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(80,160,255,0.18), transparent 64%);
            z-index: -1;
            filter: blur(10px);
        }

        .intro-logo {
            width: 100%;
            height: auto;
            display: block;
        }

        .intro-eyebrow {
            color: rgba(34,76,160,0.74);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            animation: softSpringIn 0.72s cubic-bezier(0.16,1,0.28,1) 1.45s both;
        }

        .intro-title {
            max-width: 520px;
            color: #102b61;
            font-size: clamp(30px, 5vw, 54px);
            line-height: 1.02;
            text-align: center;
            letter-spacing: -0.04em;
            font-weight: 850;
            text-shadow: 0 16px 42px rgba(255,255,255,0.60);
            animation: softSpringIn 0.72s cubic-bezier(0.16,1,0.28,1) 1.58s both;
        }

        .intro-copy {
            max-width: 430px;
            color: rgba(16,43,97,0.68);
            text-align: center;
            font-size: 15px;
            line-height: 1.55;
            animation: softSpringIn 0.72s cubic-bezier(0.16,1,0.28,1) 1.72s both;
        }

        .intro-start-btn {
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.28);
            border-radius: 999px;
            padding: 16px 28px;
            min-width: 190px;
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #1859ff 0%, #14cdf1 100%);
            box-shadow: 0 22px 56px rgba(0,110,255,0.38), inset 0 1.5px 0 rgba(255,255,255,0.30);
            transition: transform 0.48s cubic-bezier(0.2,1.4,0.28,1), box-shadow 0.38s ease;
            animation: softSpringIn 0.72s cubic-bezier(0.16,1,0.28,1) 1.86s both, actionGlow 4s ease-in-out 2.4s infinite;
        }

        .intro-start-btn:hover {
            transform: translateY(-4px) scale(1.045);
            box-shadow: 0 30px 72px rgba(0,150,255,0.48), inset 0 1.5px 0 rgba(255,255,255,0.42);
        }

        .intro-screen.leaving {
            animation: introExit 0.58s ease forwards;
        }

        body.intro-active .container {
            opacity: 0;
            transform: translateY(24px) scale(0.98);
            filter: blur(8px);
            pointer-events: none;
        }

        body.form-entered .container {
            animation: shellReveal 0.7s cubic-bezier(0.2,0.9,0.2,1) both;
        }

        body.theme-dark {
            color: #eaf2ff;
            background:
                linear-gradient(135deg, rgba(15,80,210,0.22), transparent 28%),
                linear-gradient(235deg, rgba(35,115,255,0.20), transparent 34%),
                linear-gradient(165deg, #080b12 0%, #101825 40%, #07101f 100%);
        }

        body::before {
            content: '';
            position: fixed; top: -18%; left: -12%;
            width: 60vw; height: 60vw;
            background:
                linear-gradient(120deg, transparent 0%, rgba(75,145,255,0.18) 28%, rgba(255,255,255,0.14) 45%, transparent 70%);
            border-radius: 42% 58% 48% 52%;
            filter: blur(24px);
            animation: ambientSweep 18s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: '';
            position: fixed; bottom: -12%; right: -10%;
            width: 50vw; height: 50vw;
            background:
                linear-gradient(45deg, transparent 0%, rgba(40,105,255,0.12) 32%, rgba(180,220,255,0.16) 52%, transparent 78%);
            border-radius: 48% 52% 44% 56%;
            filter: blur(28px);
            animation: ambientSweep 22s ease-in-out infinite reverse;
            pointer-events: none; z-index: 0;
        }

        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 32px 18px 56px;
            position: relative;
            z-index: 1;
        }

        .form-title {
            font-size: 32px;
            letter-spacing: 4px;
            font-weight: 800;
            background: linear-gradient(135deg, #0f2a7a 0%, #1e4bc8 60%, #3a6fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 36px;
            text-align: center;
            letter-spacing: -0.3px;
            filter: drop-shadow(0 2px 8px rgba(27,47,180,0.12));
        }

        .form-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 26px;
        }

        .form-topbar .form-title {
            margin-bottom: 0;
            text-align: left;
        }

        .theme-toggle {
            width: 52px;
            height: 52px;
            border: 1px solid rgba(255,255,255,0.72);
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.86), rgba(225,240,255,0.68));
            color: #15327e;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 16px 38px rgba(20,50,140,0.16), inset 0 1.5px 0 rgba(255,255,255,0.95);
            backdrop-filter: blur(20px) saturate(170%);
            -webkit-backdrop-filter: blur(20px) saturate(170%);
            transition: all 0.42s cubic-bezier(0.34,1.56,0.64,1);
            flex: 0 0 auto;
        }

        .theme-toggle:hover {
            transform: translateY(-3px) scale(1.06);
            box-shadow: 0 22px 50px rgba(20,50,140,0.22), inset 0 1.5px 0 rgba(255,255,255,1);
        }

        body.theme-dark .form-title {
            background: linear-gradient(135deg, #f7fbff 0%, #9ec9ff 42%, #2d7dff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 8px 22px rgba(20,110,255,0.22));
        }

        body.theme-dark .theme-toggle {
            background: linear-gradient(145deg, rgba(22,30,42,0.92), rgba(8,14,24,0.82));
            color: #dcecff;
            border-color: rgba(255,255,255,0.14);
            box-shadow: 0 18px 48px rgba(0,0,0,0.34), inset 0 1.5px 0 rgba(255,255,255,0.12);
        }

        .form-shell {
            display: grid;
            grid-template-columns: 250px minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }

        @media (min-width: 1220px) {
            .container {
                max-width: 1760px;
                width: min(96vw, 1760px);
            }
            .form-shell {
                grid-template-columns: clamp(250px, 16vw, 290px) minmax(0, 1fr) clamp(270px, 16vw, 310px);
                gap: 26px;
            }
        }

        .form-workspace {
            min-width: 0;
        }

        .cv-action-panel {
            display: none;
        }

        @media (min-width: 1220px) {
            .cv-action-panel {
                display: block;
                position: sticky;
                top: 24px;
                border-radius: 26px;
                padding: 18px;
                background: linear-gradient(165deg, rgba(255,255,255,0.70), rgba(225,240,255,0.46));
                border: 1px solid rgba(255,255,255,0.82);
                backdrop-filter: blur(28px) saturate(170%);
                -webkit-backdrop-filter: blur(28px) saturate(170%);
                box-shadow: 0 22px 62px rgba(20,50,140,0.14), inset 0 1.5px 0 rgba(255,255,255,0.95);
                overflow: hidden;
                animation: softSpringIn 0.72s cubic-bezier(0.2,0.9,0.2,1) both;
            }

            .cv-action-panel::before {
                content: '';
                position: absolute;
                inset: 0;
                background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.24) 42%, transparent 70%);
                transform: translateX(-130%);
                animation: borderRun 6s ease-in-out infinite;
                pointer-events: none;
            }

            .cv-action-title {
                font-size: 13px;
                font-weight: 850;
                color: #15327e;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                margin-bottom: 8px;
            }

            .cv-action-copy {
                font-size: 12px;
                color: rgba(27,67,180,0.62);
                line-height: 1.45;
                margin-bottom: 16px;
            }

            .cv-action-submit {
                width: 100%;
                min-height: 62px;
                border: 1px solid rgba(255,255,255,0.34);
                border-radius: 22px;
                background: linear-gradient(135deg, #1d55ff 0%, #16c4ed 100%);
                color: #fff;
                cursor: pointer;
                font: inherit;
                font-size: 15px;
                font-weight: 850;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                box-shadow: 0 18px 44px rgba(30,95,230,0.30), inset 0 1.5px 0 rgba(255,255,255,0.32);
                transition: transform 0.48s cubic-bezier(0.2,1.4,0.28,1), box-shadow 0.35s ease;
                animation: actionGlow 4.8s ease-in-out infinite;
            }

            .cv-action-submit:hover {
                transform: translateY(-4px) scale(1.025);
                box-shadow: 0 26px 66px rgba(30,145,255,0.42), inset 0 1.5px 0 rgba(255,255,255,0.42);
            }

            .form-footer,
            .footer-divider,
            .footer-text { display: none !important; }
        }

        body.theme-dark .cv-action-panel {
            background: linear-gradient(165deg, rgba(25,32,43,0.78), rgba(7,12,20,0.76));
            border-color: rgba(255,255,255,0.10);

        .tab-btn {
            flex: none;
            width: 100%;
            min-width: 0;
            padding: 13px 14px;
            border: 1.5px solid rgba(27,67,180,0.16);
            background: rgba(255,255,255,0.82);
            color: #1a3580;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            display: flex; align-items: center; justify-content: flex-start; gap: 10px;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 2px 12px rgba(20,50,140,0.09), inset 0 1.5px 0 rgba(255,255,255,1);
            position: relative; overflow: hidden;
            role: tab;
            tabindex: -1;
        }

        body.theme-dark .tab-btn {
            background: linear-gradient(145deg, rgba(255,255,255,0.07), rgba(255,255,255,0.035));
            border-color: rgba(255,255,255,0.08);
            color: rgba(235,244,255,0.72);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 24px rgba(0,0,0,0.14);
        }

        body.theme-dark .tab-btn:hover {
            background: linear-gradient(145deg, rgba(255,255,255,0.11), rgba(55,115,255,0.08));
            border-color: rgba(82,150,255,0.25);
            color: #fff;
        }

        .tab-btn i {
            width: 18px;
            text-align: center;
            flex: 0 0 18px;
        }

        .tab-btn::before {
            content: '';
            position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9) 50%, transparent);
            pointer-events: none;
        }

        .tab-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(110deg, transparent 25%, rgba(255,255,255,0.65) 50%, transparent 75%);
            transform: translateX(-130%) skewX(-15deg);
            pointer-events: none;
        }

        .tab-btn:hover::after { animation: shimmerSweep 0.65s cubic-bezier(0.4,0,0.2,1) forwards; }

        .tab-btn:hover {
            background: rgba(255,255,255,0.97);
            border-color: rgba(27,67,180,0.3);
            transform: translateY(-4px) scale(1.025);
            box-shadow: 0 12px 32px rgba(20,50,140,0.18), inset 0 1.5px 0 rgba(255,255,255,1);
        }

        .tab-btn:active {
            transform: translateY(-1px) scale(0.975);
            transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
        }

        .tab-btn.active {
            background: linear-gradient(160deg, rgba(32,60,165,0.93) 0%, rgba(22,44,138,0.97) 50%, rgba(14,28,105,1) 100%);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 8px 28px rgba(15,40,130,0.38), 0 0 0 1px rgba(80,190,255,0.18), inset 0 1.5px 0 rgba(255,255,255,0.22);
            tabindex: 0;
        }

        body.theme-dark .tab-btn.active {
            background: linear-gradient(145deg, rgba(24,95,255,0.95), rgba(12,62,195,0.92));
            box-shadow: 0 12px 34px rgba(0,92,255,0.32), inset 0 1.5px 0 rgba(255,255,255,0.20);
            border-color: rgba(150,200,255,0.28);
            color: #fff;
        }

        .tab-btn.active:after {
            background: linear-gradient(100deg, transparent 15%, rgba(130,230,255,0.30) 42%, rgba(255,255,255,0.42) 50%, rgba(30,160,255,0.24) 58%, transparent 84%);

            margin: 0 auto 18px;
            border-radius: 50%;
            overflow: hidden;
            background: #d8e1ef;
            border: 4px solid rgba(26,58,92,0.95);
            box-shadow: 0 16px 46px rgba(20,50,140,0.18), inset 0 0 0 1px rgba(255,255,255,0.75);
            cursor: grab;
            touch-action: none;
        }

        .photo-crop-stage:active {
            cursor: grabbing;
        }

        #photoCropCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .photo-editor-controls {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
        }

        .photo-editor-icon-btn,
        .photo-editor-action {
            border: 1.5px solid rgba(27,67,180,0.16);
            background: rgba(255,255,255,0.82);
            color: #1a3580;
            border-radius: 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(16px);
        }

        .photo-editor-icon-btn {
            width: 42px;
            height: 42px;
        }

        .photo-editor-icon-btn:hover,
        .photo-editor-action:hover {
            background: rgba(255,255,255,0.98);
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(20,50,140,0.14);
        }

        .photo-editor-controls input[type="range"] {
            width: 100%;
            accent-color: #1e4bc8;
        }

        .photo-editor-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .photo-editor-action {
            padding: 12px 18px;
        }

        .photo-editor-action.primary {
            background: linear-gradient(160deg, rgba(35,62,185,0.96) 0%, rgba(22,46,155,0.99) 45%, rgba(14,30,120,1) 100%);
            color: #fff;
            border-color: rgba(255,255,255,0.28);
        }

        input[type="file"] { display: none; }

        .date-input-wrapper {
            position: relative;
            display: block;
        }

        .date-input-trigger {
            width: 100%;
            padding: 13px 44px 13px 16px;
            background: rgba(255,255,255,0.78);
            border: 1.5px solid rgba(27,67,180,0.12);
            border-radius: 14px;
            font-family: inherit;
            font-size: 14px;
            color: #0f1c3f;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.42s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(16px);
            user-select: none;
        }

        .date-input-trigger:hover {
            background: rgba(255,255,255,0.94);
            border-color: rgba(27,67,180,0.24);
            transform: translateY(-2px);
        }

        .date-input-trigger.has-value {
            border-color: rgba(27,87,255,0.28);
            background: rgba(240,246,255,0.95);
        }

        .date-input-trigger.active {
            border-color: rgba(27,87,255,0.42);
            background: rgba(255,255,255,0.97);
            transform: translateY(-2px);
            box-shadow: 0 0 0 5px rgba(27,87,255,0.10);
        }

        /* ── CUSTOM DATE PICKER ── */
        .date-wrapper {
            position: relative;
        }

        .date-display-btn {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255,255,255,0.78);
            border: 1.5px solid rgba(27,67,180,0.12);
            border-radius: 14px;
            font-family: inherit;
            font-size: 14px;
            color: #0f1c3f;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(16px);
            box-shadow: 0 2px 10px rgba(20,50,140,0.07), inset 0 1.5px 0 rgba(255,255,255,0.98);
        }

        .date-display-btn:hover {
            background: rgba(255,255,255,0.92);
            border-color: rgba(27,67,180,0.24);
            transform: translateY(-2px) scale(1.003);
        }

        .date-display-btn.has-value { color: #0f1c3f; }
        .date-display-btn.placeholder-text { color: rgba(27,67,180,0.32); }

        .date-display-btn .cal-icon {
            color: rgba(27,67,180,0.45);
            font-size: 13px;
            flex-shrink: 0;
        }

        .date-display-btn .date-chevron {
            margin-left: auto;
            font-size: 11px;
            color: rgba(27,67,180,0.35);
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }

        .date-display-btn.open .date-chevron { transform: rotate(180deg); }

        .custom-calendar {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            z-index: 9999;
            width: 310px;
            background: linear-gradient(160deg, rgba(255,255,255,0.97) 0%, rgba(238,247,255,0.95) 100%);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255,255,255,0.98);
            border-radius: 24px;
            box-shadow:
                0 28px 70px rgba(15,40,140,0.22),
                0 4px 16px rgba(15,40,140,0.10),
                inset 0 1.5px 0 rgba(255,255,255,1);
            overflow: hidden;
            animation: calDrop 0.36s cubic-bezier(0.34,1.56,0.64,1) both;
            transform-origin: top center;
        }

        body.theme-dark .custom-calendar {
            background: linear-gradient(160deg, rgba(22,30,42,0.96), rgba(7,13,24,0.94));
            border-color: rgba(255,255,255,0.10);
            box-shadow: 0 28px 80px rgba(0,0,0,0.45), inset 0 1.5px 0 rgba(255,255,255,0.10);
        }

        .custom-calendar.closing {
            animation: calClose 0.22s ease-in both;
        }

        .cal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 20px 10px;
        }

        .cal-month-label {
            font-size: 26px;
            font-weight: 800;
            color: #0f1c3f;
            line-height: 1;
        }

        .cal-year-nav {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .cal-year-text {
            font-size: 14px;
            font-weight: 700;
            color: #1a3580;
        }

        .cal-year-row {
            display: grid;
            grid-template-columns: minmax(78px, 1fr) auto;
            gap: 6px;
            align-items: center;
        }

        .cal-year-input {
            width: 88px;
            height: 30px;
            border: 1.5px solid rgba(27,67,180,0.14);
            border-radius: 12px;
            background: rgba(255,255,255,0.82);
            color: #1a3580;
            font: inherit;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            outline: none;
            transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
        }

        .cal-year-input:focus {
            border-color: rgba(27,87,255,0.38);
            box-shadow: 0 0 0 4px rgba(27,87,255,0.10);
            background: rgba(255,255,255,0.98);
        }

        .cal-year-picker-btn {
            width: 30px;
            height: 30px;
            border: 1.5px solid rgba(27,67,180,0.15);
            border-radius: 50%;
            background: rgba(255,255,255,0.88);
            color: #1a3580;
            cursor: pointer;
            transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
        }

        .cal-year-picker-btn:hover {
            transform: scale(1.12);
            border-color: rgba(27,67,180,0.32);
        }

        .cal-year-panel {
            padding: 0 14px 10px;
            animation: cardReveal 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        .cal-year-panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            color: rgba(27,67,180,0.58);
            font-size: 12px;
            font-weight: 700;
        }

        .cal-year-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .cal-year-option {
            border: 1px solid rgba(27,67,180,0.12);
            border-radius: 11px;
            background: rgba(255,255,255,0.74);
            color: #1a3580;
            cursor: pointer;
            padding: 8px 0;
            font: inherit;
            font-size: 12px;
            font-weight: 700;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }

        .cal-year-option:hover {
            transform: translateY(-2px) scale(1.04);
            background: rgba(27,87,255,0.10);
            border-color: rgba(27,87,255,0.28);
        }

        .cal-year-option.active {
            background: linear-gradient(145deg, #1a3db0 0%, #2d6ee8 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 5px 18px rgba(27,87,220,0.38);
        }

        body.theme-dark .cal-year-input,
        body.theme-dark .cal-year-picker-btn,
        body.theme-dark .cal-nav-btn,
        body.theme-dark .cal-footer-btn,
        body.theme-dark .cal-year-option {
            background: rgba(255,255,255,0.075);
            border-color: rgba(255,255,255,0.10);
            color: #dcecff;
        }

        body.theme-dark .cal-month-label,
        body.theme-dark .cal-day {
            color: #eaf2ff;
        }

        body.theme-dark .cal-weekday,
        body.theme-dark .cal-day-other,
        body.theme-dark .cal-year-panel-head {
            color: rgba(220,235,255,0.42);
        }

        .cal-nav {
            display: flex;
            gap: 5px;
        }

        .cal-nav-btn {
            width: 30px;
            height: 30px;
            border: 1.5px solid rgba(27,67,180,0.15);
            background: rgba(255,255,255,0.88);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #1a3580;
            transition: all 0.32s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 2px 8px rgba(20,50,140,0.08);
        }

        .cal-nav-btn:hover {
            background: rgba(255,255,255,1);
            border-color: rgba(27,67,180,0.32);
            transform: scale(1.18);
            box-shadow: 0 4px 14px rgba(20,50,140,0.16);
        }

        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 4px 14px 2px;
            gap: 2px;
        }

        .cal-weekday {
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: rgba(27,67,180,0.45);
            letter-spacing: 0.3px;
            padding: 4px 0;
        }

        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 2px 14px 10px;
            gap: 3px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 11px;
            font-size: 13px;
            font-weight: 500;
            color: #0f1c3f;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
        }

        .cal-day:not(.cal-day-empty):not(.cal-day-other):hover {
            background: rgba(27,87,255,0.10);
            color: #1a3db0;
            transform: scale(1.18);
        }

        .cal-day-other {
            color: rgba(27,67,180,0.25);
            cursor: default;
        }

        .cal-day-today {
            color: #1a3db0;
            font-weight: 700;
        }

        .cal-day-today::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #1a3db0;
            border-radius: 50%;
        }

        .cal-day-selected {
            background: linear-gradient(145deg, #1a3db0 0%, #2d6ee8 100%);
            color: #fff !important;
            font-weight: 700;
            box-shadow: 0 5px 18px rgba(27,87,220,0.45);
            transform: scale(1.12) !important;
        }

        .cal-day-selected::after { display: none; }

        .cal-day-selected:hover { transform: scale(1.18) !important; }

        .cal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px 16px;
            border-top: 1px solid rgba(27,67,180,0.07);
            margin-top: 2px;
        }

        .cal-footer-btn {
            padding: 8px 18px;
            border: 1.5px solid rgba(27,67,180,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.85);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            color: #1a3580;
            cursor: pointer;
            transition: all 0.32s cubic-bezier(0.34,1.56,0.64,1);
        }

        .cal-footer-btn:hover {
            background: white;
            border-color: rgba(27,67,180,0.3);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 4px 14px rgba(20,50,140,0.12);
        }

        .cal-footer-btn.cal-today-btn {
            background: linear-gradient(135deg, #1a3db0, #2d6ee8);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 14px rgba(27,87,220,0.3);
        }

        .cal-footer-btn.cal-today-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 7px 22px rgba(27,87,220,0.45);
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .skill-tag {
            background: rgba(255,255,255,0.85);
            border: 1.5px solid rgba(27,67,180,0.18);
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #1a3580;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .skill-tag:hover {
            background: rgba(255,255,255,0.98);
            border-color: rgba(27,67,180,0.3);
            transform: translateY(-2px) scale(1.05);
        }

        .skill-tag.selected {
            background: linear-gradient(135deg, #1a3db0 0%, #2d6ee8 100%);
            color: #fff;
            border-color: rgba(27,87,230,0.5);
        }

        .interest-input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .interest-input-wrapper input {
            flex: 1;
        }

        .interest-input-wrapper button {
            padding: 13px 20px;
            background: rgba(255,255,255,0.82);
            border: 1.5px solid rgba(27,67,180,0.18);
            border-radius: 13px;
            color: #1a3580;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .interest-input-wrapper button:hover {
            background: rgba(255,255,255,0.98);
            border-color: rgba(27,67,180,0.3);
            transform: translateY(-2px) scale(1.05);
        }

        .interests-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .interest-badge {
            background: linear-gradient(135deg, rgba(32,90,180,0.12) 0%, rgba(60,120,220,0.08) 100%);
            border: 1.5px solid rgba(27,87,220,0.25);
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #1a3580;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .interest-badge button {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rich-editor:empty::before {
            content: attr(data-placeholder);
            color: rgba(27,67,180,0.32);
            pointer-events: none;
        }

        .toolbar-btn.active,
        .toolbar-btn[data-cmd]:focus {
            background: rgba(27,67,180,0.15);
            border-color: rgba(27,67,180,0.4);
        }

        @media (max-width: 900px) {
            .form-shell {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .tabs-container {
                position: static;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
                max-height: none;
                overflow: visible;
                margin-bottom: 4px;
            }

            .tab-btn {
                justify-content: center;
            }
        }

        @media (max-width: 600px) {
            .intro-screen { padding: 16px; }
            .intro-card {
                min-height: min(560px, calc(100vh - 32px));
                padding: 40px 22px;
                border-radius: 30px;
            }
            .intro-card::before {
                inset: 12px;
                border-radius: 24px;
            }
            .intro-cv-ghost {
                right: 18px;
                top: 28px;
                width: 96px;
                height: 124px;
                opacity: 0.34;
            }
            .intro-logo-wrap { width: min(300px, 78vw); }
            .intro-title { font-size: clamp(30px, 11vw, 42px); }
            .intro-copy { font-size: 14px; }
            .form-topbar { align-items: flex-start; }
            .form-title { font-size: 26px; }
            .theme-toggle { width: 46px; height: 46px; }
            .form-row, .form-row-three { grid-template-columns: 1fr; }
            .tabs-container { grid-template-columns: 1fr; }
            .tab-btn { min-width: auto; }
            .container { padding: 28px 14px 48px; }
            .custom-calendar { width: min(310px, calc(100vw - 42px)); }
            .photo-editor-panel { padding: 18px; }
            .photo-crop-stage { width: min(280px, 100%); height: auto; }
            .photo-editor-controls { grid-template-columns: auto 1fr auto; }
            .photo-editor-controls .photo-editor-icon-btn:last-child { grid-column: 1 / -1; width: 100%; }
            .toolbar-btn { width: 30px; height: 30px; font-size: 12px; }
            .skills-grid, .interests-list { grid-template-columns: 1fr; }
        }
    
        /* CreativeFlow lightweight skin: no intro, no liquid glass, mobile friendly */
        :root {
            --cf-page: #f7f8fd;
            --cf-surface: #ffffff;
            --cf-soft: #eef3fb;
            --cf-card: #f2f5fb;
            --cf-navy: #091540;
            --cf-persian: #1b2cc1;
            --cf-dusk: #3d518c;
            --cf-cornflower: #7692ff;
            --cf-icy: #abd2fa;
            --cf-text: #101522;
            --cf-muted: #667085;
            --cf-line: #dce2ef;
            --cf-shadow: 0 18px 42px rgba(37, 53, 91, 0.12);
            --cf-soft-shadow: 0 10px 26px rgba(37, 53, 91, 0.08);
        }

        *, *::before, *::after {
            animation: none !important;
            filter: none !important;
            -webkit-backdrop-filter: none !important;
            backdrop-filter: none !important;
        }

        html { scroll-behavior: smooth; }

        body,
        body.theme-dark {
            min-height: 100vh;
            font-family: 'Inter', Arial, sans-serif;
            color: var(--cf-text);
            background:
                radial-gradient(circle at 18% 4%, rgba(171,210,250,0.42), transparent 28%),
                linear-gradient(180deg, #f8fafc 0%, #eef4fb 48%, #f7f8fd 100%);
            overflow-x: hidden;
        }

        body::before,
        body::after,
        .intro-screen,
        .intro-screen::before,
        .intro-screen::after,
        .intro-card,
        .intro-cv-ghost,
        .intro-logo-wrap,
        .intro-logo,
        .intro-eyebrow,
        .intro-title,
        .intro-copy,
        .intro-start-btn { display: none !important; }

        body.intro-active { overflow: auto !important; }
        body.intro-active .container,
        body.form-entered .container { opacity: 1 !important; transform: none !important; }

        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 56px;
        }

        .container::before {
            content: 'CreativeFlow';
            display: inline-flex;
            align-items: center;
            margin-bottom: 18px;
            padding: 8px 14px;
            border: 1px solid var(--cf-line);
            border-radius: 999px;
            background: rgba(255,255,255,0.86);
            color: var(--cf-persian);
            font: 700 13px/1 'Sora', sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: var(--cf-soft-shadow);
        }

        .form-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin: 0 0 18px;
            padding: 24px 28px;
            border: 1px solid var(--cf-line);
            border-radius: 28px;
            background: rgba(255,255,255,0.94);
            box-shadow: var(--cf-soft-shadow);
        }

        .form-title,
        .form-topbar .form-title {
            margin: 0;
            color: var(--cf-navy) !important;
            font-family: 'Sora', sans-serif;
            font-size: clamp(28px, 4vw, 46px);
            font-weight: 700;
            letter-spacing: 0;
            text-transform: none;
        }

        .form-topbar::after {
            content: 'Preenche os teus dados e emite o CV em PDF.';
            color: var(--cf-muted);
            font-size: 14px;
            margin-left: auto;
            text-align: right;
        }

        .theme-toggle { display: none !important; }

        .form-shell {
            display: block;
            width: 100%;
            padding: 0;
            background: transparent;
            border: 0;
            box-shadow: none;
        }

        .tabs-container {
            display: grid;
            grid-template-columns: repeat(9, minmax(0, 1fr));
            gap: 8px;
            margin: 0 0 18px;
            padding: 10px;
            border: 1px solid var(--cf-line);
            border-radius: 24px;
            background: rgba(255,255,255,0.92);
            box-shadow: var(--cf-soft-shadow);
            position: static !important;
            top: auto !important;
            z-index: auto !important;
        }

        .tab-btn,
        body.theme-dark .tab-btn {
            min-width: 0;
            padding: 12px 10px;
            border: 1px solid transparent;
            border-radius: 16px;
            background: transparent;
            color: var(--cf-dusk);
            font: 700 12px/1.2 'Inter', sans-serif;
            letter-spacing: 0;
            box-shadow: none;
            transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease !important;
        }

        .tab-btn::before,
        .tab-btn::after { display: none !important; }

        .tab-btn:hover,
        .tab-btn:focus-visible {
            transform: translateY(-1px);
            background: var(--cf-soft);
            color: var(--cf-persian);
        }

        .tab-btn.active,
        body.theme-dark .tab-btn.active {
            background: var(--cf-navy);
            color: #fff;
            border-color: var(--cf-navy);
            box-shadow: 0 10px 20px rgba(9,21,64,0.16);
        }

        .form-workspace {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 310px;
            gap: 22px;
            align-items: start;
        }

        #cvForm,
        .cv-action-panel,
        body.theme-dark .cv-action-panel {
            border: 1px solid var(--cf-line);
            border-radius: 28px;
            background: rgba(255,255,255,0.96);
            box-shadow: var(--cf-shadow);
        }

        #cvForm { padding: 22px; }
        .form-footer { display: none !important; }
        .cv-action-panel {
            position: static !important;
            top: auto !important;
            padding: 22px;
        }
        .cv-action-panel::before { display: none !important; }
        .cv-action-title { font-family: 'Sora', sans-serif; color: var(--cf-navy) !important; }
        .cv-action-copy { color: var(--cf-muted) !important; }

        .section,
        body.theme-dark .section,
        .top-buttons {
            margin-bottom: 16px;
            border: 1px solid var(--cf-line);
            border-radius: 22px;
            overflow: hidden;
            background: var(--cf-surface);

        }

        .section:hover { transform: none; box-shadow: none; }

        .section-header,
        body.theme-dark .section-header {
            padding: 16px 18px;
            border: 0;
            background: linear-gradient(135deg, var(--cf-navy), #1c3b83);

        .section-header-title {
            color: #fff;
            font-family: 'Sora', sans-serif;

        .section-toggle { color: #fff; }

        .section-content,
        body.theme-dark .section-content {
            padding: 20px;
            background: #fff;
            color: var(--cf-text);
            border-top: 1px solid var(--cf-line);
        }

        .form-label,
        body.theme-dark .form-label,
        .photo-editor-title {
            color: var(--cf-navy) !important;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .form-input,
        .form-textarea,
        .form-select,
        .rich-editor,
        .rich-text-toolbar,
        .date-display-btn,
        .btn-outline,
        .btn-add,
        .toolbar-btn,
        .interest-input-wrapper button,
        .skill-tag,
        .photo-editor-panel,
        .photo-editor-close,
        .photo-editor-icon-btn,
        .photo-editor-action,
        body.theme-dark .form-input,
        body.theme-dark .form-textarea,
        body.theme-dark .form-select,
        body.theme-dark .rich-editor,
        body.theme-dark .rich-text-toolbar,
        body.theme-dark .date-display-btn,
        body.theme-dark .btn-outline,
        body.theme-dark .btn-add,
        body.theme-dark .toolbar-btn,
        body.theme-dark .interest-input-wrapper button,
        body.theme-dark .skill-tag,
        body.theme-dark .photo-editor-panel,
        body.theme-dark .photo-editor-close,
        body.theme-dark .photo-editor-icon-btn,
        body.theme-dark .photo-editor-action {
            border: 1px solid var(--cf-line) !important;

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus,
        .rich-editor:focus {
            outline: none;
            border-color: var(--cf-cornflower) !important;
            box-shadow: 0 0 0 3px rgba(118,146,255,0.18) !important;
