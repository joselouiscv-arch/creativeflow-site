        // ── CALENDAR ENGINE ──────────────────────────────────────────
        const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                           'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        const DAYS_PT   = ['seg','ter','qua','qui','sex','sáb','dom'];

        // ── RICH TEXT EDITOR ─────────────────────────────────────────
        function createRichEditorHTML(name, placeholder) {
            const id = 'rich_' + name.replace(/[\[\]]/g, '_') + '_' + Math.random().toString(36).slice(2, 7);
            return `
                <div class="rich-editor-wrapper" data-name="${name}">
                    <div class="rich-text-toolbar">
                        <button type="button" class="toolbar-btn" title="Negrito" data-cmd="bold"><b>B</b></button>
                        <button type="button" class="toolbar-btn" title="Itálico" data-cmd="italic"><i>I</i></button>
                        <button type="button" class="toolbar-btn" title="Sublinhado" data-cmd="underline"><u>U</u></button>
                        <button type="button" class="toolbar-btn" title="Lista com marcadores" data-cmd="insertUnorderedList"><i class="fas fa-list-ul"></i></button>
                        <button type="button" class="toolbar-btn" title="Lista numerada" data-cmd="insertOrderedList"><i class="fas fa-list-ol"></i></button>
                        <button type="button" class="toolbar-btn" title="Alinhar à esquerda" data-cmd="justifyLeft"><i class="fas fa-align-left"></i></button>
                        <button type="button" class="toolbar-btn" title="Centralizar" data-cmd="justifyCenter"><i class="fas fa-align-center"></i></button>
                        <button type="button" class="toolbar-btn" title="Alinhar à direita" data-cmd="justifyRight"><i class="fas fa-align-right"></i></button>
                        <button type="button" class="toolbar-btn" title="Justificado" data-cmd="justifyFull"><i class="fas fa-align-justify"></i></button>
                    </div>
                    <div class="rich-editor"
                         contenteditable="true"
                         id="${id}"
                         data-placeholder="${placeholder}"
                         spellcheck="true"></div>
                    <input type="hidden" name="${name}" class="rich-editor-hidden">
                </div>
            `;
        }

        // Attach toolbar button logic (event delegation on document)
        document.addEventListener('mousedown', function(e) {
            const btn = e.target.closest('.toolbar-btn[data-cmd]');
            if (!btn) return;
            e.preventDefault();
            const wrapper = btn.closest('.rich-editor-wrapper');
            const editor = wrapper ? wrapper.querySelector('.rich-editor') : null;
            if (editor) {
                editor.focus();
                document.execCommand(btn.dataset.cmd, false, null);
                syncRichEditor(editor);
                updateToolbarState(wrapper);
            }
        });

        // Sync contenteditable → hidden input on every input/keyup
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('rich-editor')) {
                syncRichEditor(e.target);
            }
        }, true);

        document.addEventListener('keyup', function(e) {
            if (e.target.classList.contains('rich-editor')) {
                updateToolbarState(e.target.closest('.rich-editor-wrapper'));
            }
        }, true);

        document.addEventListener('mouseup', function(e) {
            if (e.target.closest('.rich-editor-wrapper')) {
                const wrapper = e.target.closest('.rich-editor-wrapper');
                if (wrapper) updateToolbarState(wrapper);
            }
        });

        function syncRichEditor(editor) {
            const wrapper = editor.closest('.rich-editor-wrapper');
            if (!wrapper) return;
            const hidden = wrapper.querySelector('.rich-editor-hidden');
            if (hidden) hidden.value = editor.innerHTML;
        }

        function updateToolbarState(wrapper) {
            if (!wrapper) return;
            wrapper.querySelectorAll('.toolbar-btn[data-cmd]').forEach(btn => {
                const cmd = btn.dataset.cmd;
                try {
                    const active = document.queryCommandState(cmd);
                    btn.style.background = active ? 'rgba(27,67,180,0.15)' : '';
                    btn.style.borderColor = active ? 'rgba(27,67,180,0.4)' : '';
                } catch(e) {}
            });
        }

        // Placeholder behavior for rich editors
        document.addEventListener('focus', function(e) {
            if (e.target.classList.contains('rich-editor')) {
                e.target.classList.remove('empty');
            }
        }, true);
        document.addEventListener('blur', function(e) {
            if (e.target.classList.contains('rich-editor')) {
                const isEmpty = e.target.innerText.trim() === '';
                e.target.innerHTML = isEmpty ? '' : e.target.innerHTML;
                syncRichEditor(e.target);
            }
        }, true);
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('rich-editor')) {
                syncRichEditor(e.target);
            }
        }, true);
        // ── END RICH TEXT EDITOR ─────────────────────────────────────

        let activeCalBtn = null;

        function closeAllCalendars(animated = true) {
            document.querySelectorAll('.custom-calendar').forEach(cal => {
                cal.remove();
            });
            if (activeCalBtn) {
                activeCalBtn.classList.remove('open');
                activeCalBtn = null;
            }
        }

        function toggleCalendar(btn, fieldName) {
            const isOpen = btn.classList.contains('open');
            closeAllCalendars(true);
            if (isOpen) return;

            btn.classList.add('open');
            activeCalBtn = btn;

            const hidden = btn.closest('.date-wrapper').querySelector('input[type="hidden"]');
            let selDate = hidden.value ? new Date(hidden.value + 'T00:00:00') : null;
            const today = new Date();
            let viewYear  = selDate ? selDate.getFullYear() : today.getFullYear();
            let viewMonth = selDate ? selDate.getMonth()    : today.getMonth();
            let yearPanelOpen = false;
            let yearBase = Math.floor((viewYear - 6) / 12) * 12;

            const cal = document.createElement('div');
            cal.className = 'custom-calendar';

            function render() {
                const firstDay = new Date(viewYear, viewMonth, 1);
                // Monday-based: Mon=0 ... Sun=6
                let startDow = (firstDay.getDay() + 6) % 7;
                const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();
                const daysInPrev   = new Date(viewYear, viewMonth, 0).getDate();

                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                const selStr   = selDate
                    ? `${selDate.getFullYear()}-${String(selDate.getMonth()+1).padStart(2,'0')}-${String(selDate.getDate()).padStart(2,'0')}`
                    : null;

                let cells = '';
                // prev month filler
                for (let i = startDow - 1; i >= 0; i--) {
                    cells += `<div class="cal-day cal-day-other">${daysInPrev - i}</div>`;
                }
                // current month
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    let cls = 'cal-day';
                    if (dStr === selStr)   cls += ' cal-day-selected';
                    else if (dStr === todayStr) cls += ' cal-day-today';
                    cells += `<div class="${cls}" onclick="calPickDay(this,'${dStr}')">${d}</div>`;
                }
                // next month filler
                const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
                let next = 1;
                while (startDow + daysInMonth + (next - 1) < totalCells) {
                    cells += `<div class="cal-day cal-day-other">${next++}</div>`;
                }

                const yearOptions = Array.from({ length: 12 }, (_, idx) => yearBase + idx);
                const yearPanel = yearPanelOpen ? `
                    <div class="cal-year-panel">
                        <div class="cal-year-panel-head">
                            <button type="button" class="cal-nav-btn" id="calYearPrev" aria-label="Anos anteriores">&#8249;</button>
                            <span>${yearOptions[0]} - ${yearOptions[yearOptions.length - 1]}</span>
                            <button type="button" class="cal-nav-btn" id="calYearNext" aria-label="Pr&oacute;ximos anos">&#8250;</button>
                        </div>
                        <div class="cal-year-grid">
                            ${yearOptions.map(year => `<button type="button" class="cal-year-option ${year === viewYear ? 'active' : ''}" data-year="${year}">${year}</button>`).join('')}
                        </div>
                    </div>
                ` : '';

                cal.innerHTML = `
                    <div class="cal-header">
                        <div class="cal-month-label">${MONTHS_PT[viewMonth]}</div>
                        <div class="cal-year-nav">
                            <div class="cal-year-row">
                                <input class="cal-year-input" id="calYearInput" type="number" min="1900" max="2100" value="${viewYear}" aria-label="Ano">
                                <button type="button" class="cal-year-picker-btn" id="calYearPicker" aria-label="Escolher ano">
                                    <i class="fas fa-chevron-down"></i>
                                </button>
                            </div>
                            <div class="cal-nav">
                                <button type="button" class="cal-nav-btn" id="calPrev">&#8249;</button>
                                <button type="button" class="cal-nav-btn" id="calNext">&#8250;</button>
                            </div>
                        </div>
                    </div>
                    ${yearPanel}
                    <div class="cal-weekdays">
                        ${DAYS_PT.map(d => `<div class="cal-weekday">${d}</div>`).join('')}
                    </div>
                    <div class="cal-days">${cells}</div>
                    <div class="cal-footer">
                        <button type="button" class="cal-footer-btn" id="calClear">Limpar</button>
                        <button type="button" class="cal-footer-btn cal-today-btn" id="calToday">Hoje</button>
                    </div>
                `;

                cal.querySelector('#calPrev').onclick = (e) => {
                    e.stopPropagation();
                    viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; }
                    render();
                };
                cal.querySelector('#calNext').onclick = (e) => {
                    e.stopPropagation();
                    viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; }
                    render();
                };
                const yearInput = cal.querySelector('#calYearInput');
                yearInput.onclick = (e) => {
                    e.stopPropagation();
                    yearInput.select();
                };
                yearInput.onkeydown = (e) => {
                    e.stopPropagation();
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        yearInput.blur();
                    }
                };
                yearInput.onchange = (e) => {
                    e.stopPropagation();
                    const nextYear = Math.max(1900, Math.min(2100, parseInt(yearInput.value, 10) || viewYear));
                    viewYear = nextYear;
                    yearBase = Math.floor((viewYear - 6) / 12) * 12;
                    yearPanelOpen = false;
                    render();
                };
                cal.querySelector('#calYearPicker').onclick = (e) => {
                    e.stopPropagation();
                    yearPanelOpen = !yearPanelOpen;
                    yearBase = Math.floor((viewYear - 6) / 12) * 12;
                    render();
                };
                if (yearPanelOpen) {
                    cal.querySelector('#calYearPrev').onclick = (e) => {
                        e.stopPropagation();
                        yearBase -= 12;
                        render();
                    };
                    cal.querySelector('#calYearNext').onclick = (e) => {
                        e.stopPropagation();
                        yearBase += 12;
                        render();
                    };
                    cal.querySelectorAll('.cal-year-option').forEach(option => {
                        option.onclick = (e) => {
                            e.stopPropagation();
                            viewYear = Number(option.dataset.year);
                            yearPanelOpen = false;
                            render();
                        };
                    });
                }
                cal.querySelector('#calClear').onclick = (e) => {
                    e.stopPropagation();
                    selDate = null;
                    hidden.value = '';
                    if (hidden.name) formMemory[dateMemoryKey(hidden)] = '';
                    btn.querySelector('.date-text').textContent = 'Selecionar data';
                    btn.classList.remove('has-value');
                    btn.classList.add('placeholder-text');
                    render();
                };
                cal.querySelector('#calToday').onclick = (e) => {
                    e.stopPropagation();
                    calPickDay(null, todayStr, btn, hidden, cal, true);
                };
            }

            render();
            btn.closest('.date-wrapper').appendChild(cal);

            // Store refs on cal for calPickDay
            cal._btn    = btn;
            cal._hidden = hidden;
        }

        function calPickDay(el, dateStr, btn, hidden, cal, fromToday) {
            // Support both call patterns
            if (!btn) {
                cal = el.closest('.custom-calendar');
                btn    = cal._btn;
                hidden = cal._hidden;
            }

            hidden.value = dateStr;
            if (hidden.name) formMemory[dateMemoryKey(hidden)] = dateStr;
            const [y, m, d] = dateStr.split('-').map(Number);
            btn.querySelector('.date-text').textContent =
                `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;
            btn.classList.add('has-value');
            btn.classList.remove('placeholder-text');

            closeAllCalendars(false);
        }

        // Close on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.date-wrapper')) {
                closeAllCalendars(true);
            }
        }, { passive: true });
        // ── END CALENDAR ENGINE ──────────────────────────────────────

        function animateNewBlock(block) {
            block.style.opacity = '0';
            block.style.transform = 'translateY(16px) scale(0.96)';
            block.style.filter = 'blur(4px)';
            requestAnimationFrame(() => {
                block.style.transition = 'opacity 0.4s ease, transform 0.5s cubic-bezier(0.34,1.56,0.64,1), filter 0.35s ease';
                block.style.opacity = '1';
                block.style.transform = 'translateY(0) scale(1)';
                block.style.filter = 'blur(0)';
                setTimeout(() => {
                    block.style.removeProperty('transition');
                    block.style.removeProperty('filter');
                }, 520);
            });
        }

        document.getElementById('cvForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Guardar aba atual antes de recolher
            saveTabData();

            const data = {};

            // Recolher da memória (campos de todas as abas)
            Object.entries(formMemory).forEach(([key, value]) => {
                if (key.startsWith('rich_')) {
                    return;
                } else if (key.startsWith('hidden_') || key.startsWith('dateBtn_') || key.startsWith('_repeat_') || key === 'interests') {
                    // ignorar metadados internos
                } else {
                    // campos normais: nome_indice
                    const match = key.match(/^(.+)_(\d+)$/);
                    if (match) {
                        const fieldName = match[1];
                        const idx = parseInt(match[2]);
                        if (fieldName.endsWith('[]')) {
                            const k = fieldName.slice(0, -2);
                            if (!data[k]) data[k] = [];
                            data[k][idx] = value;
                        } else {
                            // se já existe valor do mesmo campo, mantém o último
                            if (idx === 0 || data[fieldName] === undefined) {
                                data[fieldName] = value;
                            }
                        }
                    }
                }
            });

            // Limpar arrays de undefined
            Object.keys(data).forEach(k => {
                if (Array.isArray(data[k])) {
                    data[k] = data[k].filter(v => v !== undefined && v !== '');
                }
            });

            // Interesses da memória
            if (formMemory['interests'] && formMemory['interests'].length > 0) {
                data['interesses'] = formMemory['interests'];
            }

            if (uploadedPhoto) {
                data.foto = uploadedPhoto.dataUrl;
                data.foto_base64 = uploadedPhoto.base64;
                data.foto_nome = uploadedPhoto.nome;
                data.foto_tipo = uploadedPhoto.tipo;
                data.foto_largura = uploadedPhoto.largura;
                data.foto_altura = uploadedPhoto.altura;
                data.foto_export_largura = uploadedPhoto.export_largura;
                data.foto_export_altura = uploadedPhoto.export_altura;
                data.photo = uploadedPhoto.dataUrl;
                data.photo_base64 = uploadedPhoto.base64;
                data.photo_name = uploadedPhoto.nome;
                data.photo_type = uploadedPhoto.tipo;
            }

            // Identificar o tipo para o Switch do n8n
            data.tipo_documento = 'cv';

            // Identificar o chat_id do Telegram (passado via query string ?chat_id=xxx)
            const params = new URLSearchParams(window.location.search);
            if (params.get('chat_id')) data.chat_id = params.get('chat_id');

            const WEBHOOK_URL = '/.netlify/functions/gerar-cv';

            const btnSubmit = this.querySelector('.btn-submit');
            const actionSubmit = document.querySelector('.cv-action-submit');
            [btnSubmit, actionSubmit].filter(Boolean).forEach(btn => {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A enviar...';
            });

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    const data = await res.json();
                    const base64 = data.pdf;
                    const binary = atob(base64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) { bytes[i] = binary.charCodeAt(i); }
                    const blob = new Blob([bytes], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = data.filename || 'curriculo.pdf';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    [btnSubmit, actionSubmit].filter(Boolean).forEach(btn => {
                        btn.innerHTML = '<i class="fas fa-check-circle"></i> Enviado com sucesso!';
                        btn.style.background = 'linear-gradient(135deg, #15773d, #1ea854)';
                    });
                } else {
                    throw new Error('Erro ' + res.status);
                }
            } catch (err) {
                [btnSubmit, actionSubmit].filter(Boolean).forEach(btn => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-file-export"></i> Emitir CV';
                });
                alert('Erro ao enviar: ' + err.message);
            }
        });

        window.addEventListener('load', () => {
            initThemeToggle();
            initIntro();
            currentTab = null;
            switchTab('info');
        }, { passive: true });
    </script>
</body>
</html>
